<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Relatório Diário de Expedição - Simonetti</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>

    <style>
        :root { --primary: #d32f2f; --finalizado: #1b5e20; --separacao: #ef6c00; --criado: #1565c0; --bg: #f4f4f4; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); margin: 0; color: #333; }
        
        header { background: var(--primary); color: white; padding: 12px 20px; display: flex; justify-content: space-between; align-items: center; }
        .btn-sair { background: none; border: 1px solid white; color: white; padding: 5px 15px; border-radius: 4px; cursor: pointer; }

        .container { padding: 15px; max-width: 1400px; margin: auto; }

        /* Título Estilo Banner */
        .banner-title { background: #b71c1c; color: white; text-align: center; padding: 10px; border-radius: 8px; margin-bottom: 20px; font-weight: bold; text-transform: uppercase; }

        /* Dashboard de Gráficos */
        .charts-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; margin-bottom: 20px; align-items: center; }
        .chart-card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); text-align: center; min-height: 300px; }
        .chart-card canvas { max-height: 250px; margin: auto; }

        /* KPI Totalizador centralizado */
        .total-badge-container { text-align: center; margin-bottom: 20px; }
        .total-badge { border: 2px solid var(--primary); color: var(--primary); padding: 10px 30px; border-radius: 30px; font-size: 20px; font-weight: bold; display: inline-block; background: white; }

        /* Toolbar de Busca e Exportação */
        .toolbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; flex-wrap: wrap; gap: 10px; }
        .search-box { flex: 1; min-width: 250px; }
        .search-box input { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 5px; }
        .export-btns button { padding: 10px 15px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; color: white; margin-left: 5px; }
        .btn-excel { background: #2e7d32; }
        .btn-pdf { background: #0288d1; }

        /* Tabela Responsiva */
        .table-wrapper { background: white; border-radius: 12px; overflow-x: auto; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        table { width: 100%; border-collapse: collapse; min-width: 1000px; }
        th { background: #b71c1c; color: white; padding: 12px 8px; text-align: left; font-size: 12px; position: sticky; top: 0; }
        td { padding: 10px 8px; border-bottom: 1px solid #eee; font-size: 13px; font-weight: 500; }

        /* Filtros na Coluna */
        .filter-select { width: 100%; margin-top: 5px; padding: 4px; font-size: 11px; border-radius: 3px; border: none; color: #333; }

        /* Badges de Status e Veículo */
        .badge { padding: 6px 12px; border-radius: 20px; color: white; font-size: 11px; font-weight: bold; text-transform: uppercase; display: inline-block; text-align: center; min-width: 90px; }
        .st-finalizado { background: #1b5e20; }
        .st-separacao { background: #ef6c00; }
        .st-criado { background: #1565c0; }
        .veic-badge { background: #37474f; } /* Cor padrão para veículo */

        @media (max-width: 768px) {
            .charts-container { grid-template-columns: 1fr; }
            th, td { font-size: 11px; padding: 6px; }
            .total-badge { font-size: 16px; }
        }
    </style>
</head>
<body>

<header>
    <div class="header-left">
        <span>Relatório Diário de Operações</span>
    </div>
    <button class="btn-sair" id="btnSair">SAIR</button>
</header>

<div class="container">
    <div class="banner-title">Expedição Móveis Simonetti</div>

    <div class="charts-container">
        <div class="chart-card">
            <h3>STATUS DAS EXPEDIÇÕES</h3>
            <canvas id="chartStatus"></canvas>
        </div>
        <div class="chart-card">
            <h3>VEÍCULOS (CARGAS)</h3>
            <canvas id="chartVeiculos"></canvas>
        </div>
    </div>

    <div class="total-badge-container">
        <div class="total-badge" id="resumoCargas">CARGAS: 0 | EXPEDIÇÕES: 0</div>
    </div>

    <div class="toolbar">
        <div class="search-box">
            <input type="text" id="inputBusca" placeholder="🔍 Buscar na tabela (Placa, Destino, Conferente...)" onkeyup="filtrarGeral()">
        </div>
        <div class="export-btns">
            <button class="btn-excel" onclick="exportarExcel()">📊 EXCEL</button>
            <button class="btn-pdf" onclick="exportarPDF()">📄 PDF</button>
        </div>
    </div>

    <div class="table-wrapper">
        <table id="tabelaDados">
            <thead>
                <tr id="headerFiltros">
                    <th>DATA <br> <select class="filter-select" onchange="filtrarColuna(0, this.value)"><option value="">FILTRAR</option></select></th>
                    <th>EXPEDIÇÃO <br> <select class="filter-select" onchange="filtrarColuna(1, this.value)"><option value="">FILTRAR</option></select></th>
                    <th>PLACA <br> <select class="filter-select" onchange="filtrarColuna(2, this.value)"><option value="">FILTRAR</option></select></th>
                    <th>DESTINO <br> <select class="filter-select" onchange="filtrarColuna(3, this.value)"><option value="">FILTRAR</option></select></th>
                    <th>BOX <br> <select class="filter-select" onchange="filtrarColuna(4, this.value)"><option value="">FILTRAR</option></select></th>
                    <th>STATUS <br> <select class="filter-select" onchange="filtrarColuna(5, this.value)"><option value="">FILTRAR</option></select></th>
                    <th>CONFERENTE <br> <select class="filter-select" onchange="filtrarColuna(6, this.value)"><option value="">FILTRAR</option></select></th>
                    <th>VEÍCULO <br> <select class="filter-select" onchange="filtrarColuna(7, this.value)"><option value="">FILTRAR</option></select></th>
                    <th>PESO <br> <select class="filter-select" onchange="filtrarColuna(8, this.value)"><option value="">FILTRAR</option></select></th>
                </tr>
            </thead>
            <tbody id="corpoTabela">
                </tbody>
        </table>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, collection, query, where, getDocs, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = { apiKey: "AIzaSyAhxv3c9aajgCYHnEJG7TS_VxKqJ06KBJg", authDomain: "logistica-exp.firebaseapp.com", projectId: "logistica-exp" };
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    let dadosOriginais = [];
    let chartStatus, chartVeiculos;

    onAuthStateChanged(auth, user => { 
        if(user) carregarRelatorioDoDia(); 
        else window.location.href="index.html"; 
    });

    async function carregarRelatorioDoDia() {
        const hojeLocal = new Date().toISOString().split('T')[0]; // YYYY-MM-DD
        
        // Busca apenas as expedições do dia atual
        const q = query(
            collection(db, "expedicoes"), 
            where("data", "==", hojeLocal),
            orderBy("codigo", "asc")
        );
        
        const snap = await getDocs(q);
        dadosOriginais = [];
        snap.forEach(doc => dadosOriginais.push(doc.data()));

        renderizarTabela(dadosOriginais);
        atualizarGráficos(dadosOriginais);
        preencherFiltrosCascata(dadosOriginais);
    }

    function renderizarTabela(lista) {
        const corpo = document.getElementById('corpoTabela');
        corpo.innerHTML = "";

        lista.forEach(d => {
            const statusClass = d.status === 'CONFERÊNCIA FINALIZADA' || d.status === 'FINALIZADO' ? 'st-finalizado' : 
                               d.status === 'EM SEPARAÇÃO' ? 'st-separacao' : 'st-criado';
            
            corpo.innerHTML += `
                <tr>
                    <td>${d.data.split('-').reverse().join('/')}</td>
                    <td>${d.codigo}</td>
                    <td><strong>${d.placa}</strong></td>
                    <td>${d.destino}</td>
                    <td>${d.box}</td>
                    <td><span class="badge ${statusClass}">${d.status}</span></td>
                    <td>${d.conferente}</td>
                    <td><span class="badge veic-badge">${d.tipo}</span></td>
                    <td>${d.peso}</td>
                </tr>
            `;
        });

        // Atualiza o contador de Cargas vs Expedições
        const placasUnicas = new Set(lista.map(i => i.placa)).size;
        document.getElementById('resumoCargas').innerText = `CARGAS: ${placasUnicas} | EXPEDIÇÕES: ${lista.length}`;
    }

    function atualizarGráficos(lista) {
        const statusCont = {};
        const veiculoCont = {};

        lista.forEach(d => {
            statusCont[d.status] = (statusCont[d.status] || 0) + 1;
            veiculoCont[d.tipo] = (veiculoCont[d.tipo] || 0) + 1;
        });

        const ctxStatus = document.getElementById('chartStatus').getContext('2d');
        const ctxVeic = document.getElementById('chartVeiculos').getContext('2d');

        if(chartStatus) chartStatus.destroy();
        if(chartVeiculos) chartVeiculos.destroy();

        // Cores baseadas no status para sincronizar com a tabela
        const statusColors = Object.keys(statusCont).map(s => 
            s.includes('FINALIZADO') ? '#1b5e20' : s.includes('SEPARAÇÃO') ? '#ef6c00' : '#1565c0'
        );

        chartStatus = new Chart(ctxStatus, {
            type: 'pie',
            data: {
                labels: Object.keys(statusCont),
                datasets: [{ data: Object.values(statusCont), backgroundColor: statusColors }]
            },
            options: { plugins: { tooltip: { callbacks: { label: (c) => `${c.label}: ${c.raw} (${((c.raw/lista.length)*100).toFixed(1)}%)` } } } }
        });

        chartVeiculos = new Chart(ctxVeic, {
            type: 'doughnut',
            data: {
                labels: Object.keys(veiculoCont),
                datasets: [{ data: Object.values(veiculoCont), backgroundColor: ['#263238', '#455a64', '#607d8b', '#90a4ae'] }]
            }
        });
    }

    // Filtro por coluna com efeito cascata
    window.filtrarColuna = (index, valor) => {
        const rows = document.querySelectorAll("#corpoTabela tr");
        rows.forEach(row => {
            const cellText = row.cells[index].innerText;
            if (valor === "" || cellText.includes(valor)) {
                row.style.display = "";
            } else {
                row.style.display = "none";
            }
        });
        recalcularTotaisAposFiltro();
    };

    // Busca Geral
    window.filtrarGeral = () => {
        const busca = document.getElementById('inputBusca').value.toLowerCase();
        const rows = document.querySelectorAll("#corpoTabela tr");
        rows.forEach(row => {
            row.style.display = row.innerText.toLowerCase().includes(busca) ? "" : "none";
        });
        recalcularTotaisAposFiltro();
    };

    function recalcularTotaisAposFiltro() {
        const visiveis = Array.from(document.querySelectorAll("#corpoTabela tr"))
                              .filter(r => r.style.display !== "none");
        const placas = new Set(visiveis.map(r => r.cells[2].innerText)).size;
        document.getElementById('resumoCargas').innerText = `CARGAS: ${placas} | EXPEDIÇÕES: ${visiveis.length}`;
    }

    function preencherFiltrosCascata(lista) {
        const indexes = [0,1,2,3,4,5,6,7]; // Colunas para ter filtro
        const selects = document.querySelectorAll(".filter-select");
        
        indexes.forEach((colIdx, i) => {
            const unicos = [...new Set(lista.map(d => {
                const vals = Object.values(d);
                // Mapeamento manual para garantir que o index bata com o dado do Firebase
                const map = [d.data, d.codigo, d.placa, d.destino, d.box, d.status, d.conferente, d.tipo];
                return map[colIdx];
            }))].sort();

            unicos.forEach(val => {
                const opt = document.createElement("option");
                opt.value = val;
                opt.textContent = val;
                selects[colIdx].appendChild(opt);
            });
        });
    }

    // Exportações
    window.exportarExcel = () => {
        const tb = document.getElementById('tabelaDados');
        const wb = XLSX.utils.table_to_book(tb);
        XLSX.writeFile(wb, "Relatorio_Expedicao_Simonetti.xlsx");
    };

    window.exportarPDF = () => {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF('l', 'mm', 'a4');
        doc.text("Relatório Diário de Expedição - Móveis Simonetti", 14, 15);
        doc.autoTable({ 
            html: '#tabelaDados', 
            startY: 20, 
            theme: 'grid',
            headStyles: { fillColor: [183, 28, 28] }
        });
        doc.save("Relatorio_Simonetti.pdf");
    };

    document.getElementById('btnSair').onclick = () => signOut(auth);
</script>
</body>
</html>
