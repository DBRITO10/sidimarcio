<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Relatório de Expedição - Simonetti</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>

    <style>
        :root { --primary: #d32f2f; --accent: #ffeb3b; --finalizado: #1b5e20; --separacao: #ef6c00; --criado: #1565c0; --bg: #f4f4f4; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); margin: 0; color: #333; }
        
        header { background: var(--primary); color: white; padding: 12px 20px; display: flex; justify-content: space-between; align-items: center; position: sticky; top:0; z-index: 100; }
        .header-left { display: flex; align-items: center; gap: 15px; }
        .btn-header { background: rgba(255,255,255,0.2); border: 1px solid white; color: white; padding: 6px 12px; border-radius: 4px; cursor: pointer; text-decoration: none; font-size: 13px; font-weight: bold; }
        
        .container { padding: 15px; max-width: 1400px; margin: auto; }
        .banner-title { background: #b71c1c; color: white; text-align: center; padding: 10px; border-radius: 8px; margin-bottom: 20px; font-weight: bold; text-transform: uppercase; }

        /* Dashboard */
        .charts-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; margin-bottom: 20px; }
        .chart-card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); text-align: center; }
        .chart-card canvas { max-height: 220px; margin: auto; }

        .total-badge-container { text-align: center; margin-bottom: 20px; }
        .total-badge { border: 2px solid var(--primary); color: var(--primary); padding: 10px 30px; border-radius: 30px; font-size: 18px; font-weight: bold; background: white; display: inline-block; }

        /* Toolbar */
        .toolbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; flex-wrap: wrap; gap: 10px; }
        .btn-filter { background: #37474f; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-weight: bold; display: flex; align-items: center; gap: 8px; }
        .btn-filter.active { background: var(--accent); color: #000; box-shadow: 0 0 10px rgba(255,235,59,0.5); }
        
        /* Modal */
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); }
        .modal-content { background: white; width: 90%; max-width: 500px; margin: 50px auto; border-radius: 12px; overflow: hidden; animation: animatetop 0.3s; }
        @keyframes animatetop { from {top:-300px; opacity:0} to {top:50px; opacity:1} }
        .modal-header { background: #b71c1c; color: white; padding: 15px; font-weight: bold; }
        .modal-body { padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .modal-footer { padding: 15px; background: #f9f9f9; display: flex; justify-content: flex-end; gap: 10px; }
        
        .filter-group { display: flex; flex-direction: column; gap: 5px; }
        .filter-group label { font-size: 12px; font-weight: bold; color: #666; }
        .filter-group select, .filter-group input { padding: 10px; border: 1px solid #ccc; border-radius: 5px; }

        /* Tabela */
        .table-wrapper { background: white; border-radius: 12px; overflow-x: auto; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        table { width: 100%; border-collapse: collapse; min-width: 1000px; }
        th { background: #b71c1c; color: white; padding: 12px; text-align: left; font-size: 12px; position: sticky; top: 0; }
        td { padding: 12px; border-bottom: 1px solid #eee; font-size: 13px; font-weight: 500; }

        .badge { padding: 6px 12px; border-radius: 20px; color: white; font-size: 11px; font-weight: bold; text-transform: uppercase; }
        .st-finalizado { background: var(--finalizado); }
        .st-separacao { background: var(--separacao); }
        .st-criado { background: var(--criado); }

        .btn-apply { background: #2e7d32; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; }
        .btn-cancel { background: #757575; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; }

        @media (max-width: 768px) { .charts-container { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<header>
    <div class="header-left">
        <a href="menu.html" class="btn-header">⬅ VOLTAR</a>
        <span id="userNameDisplay" style="font-weight: bold; font-size: 14px;">Bem-vindo!</span>
    </div>
    <button class="btn-sair" id="btnSair">SAIR</button>
</header>

<div class="container">
    <div class="banner-title">Expedição Móveis Simonetti</div>

    <div class="charts-container">
        <div class="chart-card">
            <h3>STATUS DAS EXPEDIÇÕES</h3>
            <canvas id="chartStatus"></canvas>
        </div>
        <div class="chart-card">
            <h3>VEÍCULOS (CARGAS)</h3>
            <canvas id="chartVeiculos"></canvas>
        </div>
    </div>

    <div class="total-badge-container">
        <div class="total-badge" id="resumoCargas">CARGAS: 0 | EXPEDIÇÕES: 0</div>
    </div>

    <div class="toolbar">
        <button class="btn-filter" id="btnOpenModal">
            🔍 FILTROS AVANÇADOS <span id="filterStatus"></span>
        </button>
        <div class="export-btns">
            <button class="btn-excel" onclick="exportarExcel()" style="background:#2e7d32; color:white; border:none; padding:10px; border-radius:5px; cursor:pointer;">📊 EXCEL</button>
            <button class="btn-pdf" onclick="exportarPDF()" style="background:#0288d1; color:white; border:none; padding:10px; border-radius:5px; cursor:pointer;">📄 PDF</button>
        </div>
    </div>

    <div class="table-wrapper">
        <table id="tabelaDados">
            <thead>
                <tr>
                    <th>DATA</th>
                    <th>EXPEDIÇÃO</th>
                    <th>PLACA</th>
                    <th>DESTINO</th>
                    <th>BOX</th>
                    <th>STATUS</th>
                    <th>CONFERENTE</th>
                    <th>VEÍCULO</th>
                    <th>PESO</th>
                </tr>
            </thead>
            <tbody id="corpoTabela"></tbody>
        </table>
    </div>
</div>

<div id="modalFiltros" class="modal">
    <div class="modal-content">
        <div class="modal-header">FILTRAR RELATÓRIO</div>
        <div class="modal-body">
            <div class="filter-group">
                <label>DATA DA EXPEDIÇÃO</label>
                <input type="date" id="filterData">
                <small style="color:red">Deixe vazio para ver todas as datas</small>
            </div>
            <div class="filter-group">
                <label>CONFERENTE</label>
                <select id="filterConferente"><option value="">Todos</option></select>
            </div>
            <div class="filter-group">
                <label>STATUS</label>
                <select id="filterStatusDoc">
                    <option value="">Todos</option>
                    <option value="FINALIZADO">FINALIZADO</option>
                    <option value="EM SEPARAÇÃO">EM SEPARAÇÃO</option>
                </select>
            </div>
        </div>
        <div class="modal-footer">
            <button class="btn-cancel" id="btnCancel">CANCELAR</button>
            <button class="btn-apply" id="btnApply">APLICAR FILTRO</button>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, collection, query, where, getDocs, orderBy, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = { apiKey: "AIzaSyAhxv3c9aajgCYHnEJG7TS_VxKqJ06KBJg", authDomain: "logistica-exp.firebaseapp.com", projectId: "logistica-exp" };
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    let dadosCompletos = [];
    let chartStatus, chartVeiculos;

    // 1. DEFINIR DATA ATUAL CORRETA (Sem erro de fuso)
    const obterDataHoje = () => {
        const d = new Date();
        const offset = d.getTimezoneOffset() * 60000;
        return new Date(d.getTime() - offset).toISOString().split('T')[0];
    };

    onAuthStateChanged(auth, async user => { 
        if(user) {
            document.getElementById('userNameDisplay').innerText = `Usuário: ${user.email.split('@')[0].toUpperCase()}`;
            // Inicia na data de hoje
            document.getElementById('filterData').value = obterDataHoje();
            carregarDados();
        } else { window.location.href="index.html"; }
    });

    // Função de Busca Principal
    async function carregarDados() {
        const dataFiltro = document.getElementById('filterData').value;
        const conferenteFiltro = document.getElementById('filterConferente').value;
        const statusFiltro = document.getElementById('filterStatusDoc').value;

        let q = collection(db, "expedicoes");
        
        // Se houver data, filtra direto no Firebase para performance
        if(dataFiltro) {
            q = query(q, where("data", "==", dataFiltro));
            document.getElementById('btnOpenModal').classList.add('active');
        } else {
            document.getElementById('btnOpenModal').classList.remove('active');
        }

        const snap = await getDocs(q);
        dadosCompletos = [];
        snap.forEach(doc => dadosCompletos.push(doc.data()));

        // Filtros secundários via JS (Conferente e Status)
        let dadosFiltrados = dadosCompletos;
        if(conferenteFiltro) dadosFiltrados = dadosFiltrados.filter(d => d.conferente === conferenteFiltro);
        if(statusFiltro) dadosFiltrados = dadosFiltrados.filter(d => d.status.includes(statusFiltro));

        renderizar(dadosFiltrados);
        atualizarFiltrosNoModal(dadosCompletos); // Alimenta o select do modal
    }

    function renderizar(lista) {
        const corpo = document.getElementById('corpoTabela');
        corpo.innerHTML = "";
        
        lista.forEach(d => {
            const stClass = d.status.includes('FINALIZADO') ? 'st-finalizado' : d.status.includes('SEPARAÇÃO') ? 'st-separacao' : 'st-criado';
            corpo.innerHTML += `
                <tr>
                    <td>${d.data.split('-').reverse().join('/')}</td>
                    <td>${d.codigo}</td>
                    <td><strong>${d.placa}</strong></td>
                    <td>${d.destino}</td>
                    <td>${d.box}</td>
                    <td><span class="badge ${stClass}">${d.status}</span></td>
                    <td>${d.conferente}</td>
                    <td><span class="badge" style="background:#455a64">${d.tipo}</span></td>
                    <td>${d.peso}</td>
                </tr>`;
        });

        const placas = new Set(lista.map(i => i.placa)).size;
        document.getElementById('resumoCargas').innerText = `CARGAS: ${placas} | EXPEDIÇÕES: ${lista.length}`;
        atualizarGraficos(lista);
    }

    function atualizarGraficos(lista) {
        const st = {}, vc = {};
        lista.forEach(d => {
            st[d.status] = (st[d.status] || 0) + 1;
            vc[d.tipo] = (vc[d.tipo] || 0) + 1;
        });

        if(chartStatus) chartStatus.destroy();
        if(chartVeiculos) chartVeiculos.destroy();

        chartStatus = new Chart(document.getElementById('chartStatus'), {
            type: 'pie',
            data: { labels: Object.keys(st), datasets: [{ data: Object.values(st), backgroundColor: ['#1b5e20','#ef6c00','#1565c0','#7e57c2'] }] }
        });

        chartVeiculos = new Chart(document.getElementById('chartVeiculos'), {
            type: 'doughnut',
            data: { labels: Object.keys(vc), datasets: [{ data: Object.values(vc), backgroundColor: ['#263238', '#455a64', '#607d8b'] }] }
        });
    }

    function atualizarFiltrosNoModal(lista) {
        const select = document.getElementById('filterConferente');
        const conferentes = [...new Set(lista.map(d => d.conferente))].sort();
        const valorAtual = select.value;
        select.innerHTML = '<option value="">Todos</option>';
        conferentes.forEach(c => {
            const opt = document.createElement('option');
            opt.value = c; opt.textContent = c;
            select.appendChild(opt);
        });
        select.value = valorAtual;
    }

    // Lógica do Modal
    const modal = document.getElementById('modalFiltros');
    document.getElementById('btnOpenModal').onclick = () => modal.style.display = 'block';
    document.getElementById('btnCancel').onclick = () => modal.style.display = 'none';
    document.getElementById('btnApply').onclick = () => {
        carregarDados();
        modal.style.display = 'none';
    };

    window.exportarExcel = () => {
        const wb = XLSX.utils.table_to_book(document.getElementById('tabelaDados'));
        XLSX.writeFile(wb, "Expedicao_Simonetti.xlsx");
    };

    window.exportarPDF = () => {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF('l', 'mm', 'a4');
        doc.autoTable({ html: '#tabelaDados', theme: 'grid', headStyles: {fillColor: [183, 28, 28]} });
        doc.save("Expedicao_Simonetti.pdf");
    };

    document.getElementById('btnSair').onclick = () => signOut(auth);
</script>
</body>
</html>
