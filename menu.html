<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu Principal - Simonetti</title>
    <style>
        :root {
            --primary: #d32f2f;
            --bg-body: #fdf2f2;
            --bg-card: #ffffff;
            --text-dark: #333333;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--bg-body);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            background-color: var(--primary);
            color: white;
            width: 100%;
            padding: 20px 0;
            text-align: center;
            font-weight: bold;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }

        .menu-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            width: 90%;
            max-width: 600px;
            padding-bottom: 30px;
        }

        .menu-item {
            background: var(--bg-card);
            border: 1px solid #f0d8d8;
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            text-decoration: none;
            color: var(--text-dark);
            transition: transform 0.2s, box-shadow 0.2s;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        .menu-item:active {
            transform: scale(0.95);
            background-color: #fffafa;
        }

        .icon {
            font-size: 30px;
            margin-bottom: 10px;
        }

        .menu-item span {
            font-weight: bold;
            font-size: 14px;
        }

        .admin-only {
            border-left: 5px solid var(--primary);
        }

        .footer-info {
            margin-top: auto;
            padding: 20px;
            font-size: 12px;
            color: #888;
        }
    </style>
</head>
<body>

<header>
    SISTEMA DE EXPEDIÇÃO
</header>

<div class="menu-grid">
    <a href="dashboard.html" class="menu-item">
        <div class="icon">📊</div>
        <span>Dashboard</span>
    </a>

    <a href="cadastro-expedicao.html" class="menu-item admin-only">
        <div class="icon">➕</div>
        <span>Nova Expedição</span>
    </a>

    <a href="atribuir-carregamento.html" class="menu-item">
        <div class="icon">🚛</div>
        <span>Vincular Carga</span>
    </a>

    <a href="conferencia.html" class="menu-item">
        <div class="icon">✅</div>
        <span>Conferência</span>
    </a>

    <a href="equipe.html" class="menu-item admin-only">
        <div class="icon">👥</div>
        <span>Cadastrar Equipe</span>
    </a>

    <a href="relatorio-produtividade.html" class="menu-item admin-only">
        <div class="icon">💰</div>
        <span>Produtividade</span>
    </a>
</div>

<div class="footer-info">
    Logado como: <strong id="userDisplay">...</strong>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = { 
        apiKey: "AIzaSyAhxv3c9aajgCYHnEJG7TS_VxKqJ06KBJg", 
        authDomain: "logistica-exp.firebaseapp.com", 
        projectId: "logistica-exp" 
    };
    
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    onAuthStateChanged(auth, async (user) => {
        if (user) {
            const userDoc = await getDoc(doc(db, "usuarios", user.uid));
            if (userDoc.exists()) {
                const data = userDoc.data();
                document.getElementById('userDisplay').innerText = data.nome;
                
                // Se NÃO for admin, esconde os botões de ADM
                if (data.nivel !== 'admin') {
                    document.querySelectorAll('.admin-only').forEach(el => el.style.display = 'none');
                }
            }
        } else {
            window.location.href = "index.html";
        }
    });
</script>

</body>
</html>
