<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu Principal - Simonetti</title>
    <style>
        :root {
            --primary: #d32f2f;
            --bg-body: #fdf2f2;
            --white: #ffffff;
            --text: #333;
            --shadow: 0 4px 12px rgba(0,0,0,0.1);
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-body);
            margin: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* Header Profissional */
        header {
            background-color: var(--primary);
            color: var(--white);
            padding: 15px 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: var(--shadow);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .user-info { font-weight: 600; font-size: 16px; }
        
        .btn-sair {
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid var(--white);
            color: var(--white);
            padding: 8px 18px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }

        .btn-sair:hover { background: var(--white); color: var(--primary); }

        /* Grid de Cards */
        .container {
            flex: 1;
            padding: 30px 20px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 20px;
            max-width: 900px;
            margin: 0 auto;
            width: 100%;
            box-sizing: border-box;
        }

        .card {
            background: var(--white);
            border-radius: 15px;
            padding: 25px 15px;
            text-align: center;
            text-decoration: none;
            color: var(--text);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            border: 1px solid #eee;
            /* Escondido por padrão, o JS mostra conforme nível */
            display: none; 
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: var(--shadow);
            border-color: var(--primary);
        }

        .card i { font-size: 40px; margin-bottom: 12px; }
        .card span { font-weight: bold; font-size: 14px; text-transform: uppercase; }

        /* Rodapé */
        footer {
            text-align: center;
            padding: 20px;
            font-size: 12px;
            color: #888;
        }

        /* Responsividade para Celular */
        @media (max-width: 480px) {
            .container { grid-template-columns: 1fr 1fr; gap: 12px; }
            .card { padding: 15px 10px; }
        }
    </style>
</head>
<body>

<header>
    <div class="user-info">👤 <span id="userName">Carregando...</span></div>
    <button class="btn-sair" id="btnSair">SAIR</button>
</header>

<div class="container" id="menuContainer">
    <a href="dashboard.html" class="card" data-level="leitor,usuario,colaborador,admin">
        <i>📊</i><span>Dashboard</span>
    </a>

    <a href="cadastro-expedicao.html" class="card" data-level="colaborador,admin">
        <i>➕</i><span>Nova Expedição</span>
    </a>

    <a href="atribuir-carregamento.html" class="card" data-level="colaborador,admin">
        <i>🚛</i><span>Vincular Carga</span>
    </a>

    <a href="conferencia.html" class="card" data-level="usuario,admin">
        <i>✅</i><span>Conferência</span>
    </a>

    <a href="equipe.html" class="card" data-level="admin">
        <i>👥</i><span>Gestão Equipe</span>
    </a>

    <a href="veiculos.html" class="card" data-level="admin">
        <i>🚚</i><span>Cadastro Frota</span>
    </a>

    <a href="relatorio-produtividade.html" class="card" data-level="colaborador,admin">
        <i>💰</i><span>Produtividade</span>
    </a>

    <a href="gestao-usuarios.html" class="card" data-level="admin">
        <i>⚙️</i><span>Usuários</span>
    </a>

    <a href="historico.html" class="card" data-level="admin">
        <i>📜</i><span>Histórico</span>
    </a>
</div>

<footer>Móveis Simonetti - Logística v2.0</footer>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    // Configuração (Certifique-se que o seu firebase-config.js exporta isso ou cole aqui)
    const firebaseConfig = {
        apiKey: "AIzaSyAhxv3c9aajgCYHnEJG7TS_VxKqJ06KBJg",
        authDomain: "logistica-exp.firebaseapp.com",
        projectId: "logistica-exp"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    onAuthStateChanged(auth, async (user) => {
        if (user) {
            const userDoc = await getDoc(doc(db, "usuarios", user.uid));
            
            if (userDoc.exists()) {
                const userData = userDoc.data();
                document.getElementById('userName').innerText = userData.nome.split(' ')[0]; // Só primeiro nome
                
                // Lógica de Permissão nos Cards
                const nivel = userData.nivel || 'leitor';
                const cards = document.querySelectorAll('.card');
                
                cards.forEach(card => {
                    const levelsAllowed = card.getAttribute('data-level').split(',');
                    if (levelsAllowed.includes(nivel)) {
                        card.style.display = 'flex';
                    }
                });
            } else {
                window.location.href = "primeiro-acesso.html";
            }
        } else {
            window.location.href = "index.html";
        }
    });

    // Botão Sair
    document.getElementById('btnSair').addEventListener('click', () => {
        signOut(auth).then(() => {
            window.location.href = "index.html";
        });
    });
</script>

</body>
</html>
