<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Logística - Simonetti</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --primary: #d32f2f; --bg-body: #fdf2f2; --white: #fff; --text: #333; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg-body); margin: 0; padding: 0; color: var(--text); }
        
        header { background: var(--primary); color: white; padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; }
        .header-left { display: flex; align-items: center; gap: 15px; }
        .btn-back { color: white; text-decoration: none; font-size: 20px; }
        .btn-sair { background: rgba(255,255,255,0.2); border: 1px solid white; color: white; padding: 5px 15px; border-radius: 4px; cursor: pointer; font-weight: bold; }

        .container { padding: 20px; max-width: 1200px; margin: auto; }
        
        /* Filtros e Indicadores */
        .top-bar { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 20px; }
        .card-meta { background: var(--white); padding: 15px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); text-align: center; border-bottom: 4px solid var(--primary); }
        .card-meta h2 { margin: 5px 0; color: var(--primary); font-size: 24px; }
        .card-meta span { font-size: 12px; font-weight: bold; color: #666; text-transform: uppercase; }

        .filtros-box { background: white; padding: 15px; border-radius: 8px; margin-bottom: 20px; display: flex; gap: 10px; align-items: flex-end; flex-wrap: wrap; }
        .filtros-box div { flex: 1; min-width: 150px; }
        .filtros-box label { font-size: 11px; font-weight: bold; display: block; margin-bottom: 5px; }
        .filtros-box input { width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px; }
        .btn-update { background: var(--primary); color: white; border: none; padding: 10px 20px; border-radius: 4px; cursor: pointer; font-weight: bold; }

        /* Gráficos */
        .charts-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; margin-bottom: 20px; }
        .chart-card { background: white; padding: 15px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .chart-card h3 { font-size: 14px; color: #555; margin-top: 0; border-bottom: 1px solid #eee; padding-bottom: 10px; }

        .table-card { background: white; padding: 15px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        table { width: 100%; border-collapse: collapse; font-size: 13px; }
        th { text-align: left; padding: 10px; background: #f8f8f8; color: #666; }
        td { padding: 10px; border-bottom: 1px solid #eee; }
        .badge { padding: 3px 7px; border-radius: 4px; font-size: 10px; font-weight: bold; }
        .status-viagem { background: #e3f2fd; color: #1565c0; }
        .status-finalizado { background: #e8f5e9; color: #2e7d32; }
    </style>
</head>
<body>

<header>
    <div class="header-left">
        <a href="menu.html" class="btn-back">⬅️</a>
        <span>Dashboard Operacional</span>
    </div>
    <button class="btn-sair" id="btnSair">SAIR</button>
</header>

<div class="container">
    <div class="filtros-box">
        <div>
            <label>INÍCIO DO MÊS</label>
            <input type="date" id="dataInicio">
        </div>
        <div>
            <label>ATÉ HOJE</label>
            <input type="date" id="dataFim">
        </div>
        <button class="btn-update" id="btnFiltrar">ATUALIZAR DADOS</button>
    </div>

    <div class="top-bar">
        <div class="card-meta">
            <span id="labelCargas">Total de Veículos</span>
            <h2 id="totalVeiculos">0</h2>
        </div>
        <div class="card-meta">
            <span>Expedições Geradas</span>
            <h2 id="totalExp">0</h2>
        </div>
        <div class="card-meta">
            <span>Peso Total (Ton)</span>
            <h2 id="totalPeso">0</h2>
        </div>
    </div>

    <div class="charts-grid">
        <div class="chart-card">
            <h3>DISTRIBUIÇÃO POR DESTINO</h3>
            <canvas id="chartDestino"></canvas>
        </div>
        <div class="chart-card">
            <h3>CARGAS POR TIPO DE VEÍCULO</h3>
            <canvas id="chartTipos"></canvas>
        </div>
    </div>

    <div class="table-card">
        <h3>MOVIMENTAÇÕES RECENTES</h3>
        <div style="overflow-x: auto;">
            <table>
                <thead>
                    <tr>
                        <th>DATA</th>
                        <th>EXPEDIÇÃO</th>
                        <th>PLACA</th>
                        <th>DESTINO</th>
                        <th>STATUS</th>
                    </tr>
                </thead>
                <tbody id="listaRecentes">
                    </tbody>
            </table>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, collection, query, where, getDocs, orderBy, Timestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = { apiKey: "AIzaSyAhxv3c9aajgCYHnEJG7TS_VxKqJ06KBJg", authDomain: "logistica-exp.firebaseapp.com", projectId: "logistica-exp" };
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    // Inicializar datas (1º dia do mês até hoje)
    const hoje = new Date();
    document.getElementById('dataInicio').value = new Date(hoje.getFullYear(), hoje.getMonth(), 1).toISOString().split('T')[0];
    document.getElementById('dataFim').value = hoje.toISOString().split('T')[0];

    let chart1, chart2;

    onAuthStateChanged(auth, user => { if(user) carregarDashboard(); else window.location.href="index.html"; });

    async function carregarDashboard() {
        const dIni = new Date(document.getElementById('dataInicio').value + "T00:00:00");
        const dFim = new Date(document.getElementById('dataFim').value + "T23:59:59");

        const q = query(collection(db, "expedicoes"), 
                  where("criadoEm", ">=", Timestamp.fromDate(dIni)),
                  where("criadoEm", "<=", Timestamp.fromDate(dFim)),
                  orderBy("criadoEm", "desc"));
        
        const snap = await getDocs(q);
        
        let resumo = { exp: 0, peso: 0, destinos: {}, tipos: {}, placas: new Set() };
        const corpo = document.getElementById('listaRecentes');
        corpo.innerHTML = "";

        snap.forEach(doc => {
            const d = doc.data();
            resumo.exp++;
            resumo.peso += (d.peso || 0);
            resumo.placas.add(d.placa);
            
            // Contagem para gráficos
            resumo.destinos[d.destino] = (resumo.destinos[d.destino] || 0) + 1;
            resumo.tipos[d.tipo] = (resumo.tipos[d.tipo] || 0) + 1;

            // Preencher Tabela (apenas os últimos 10)
            if (corpo.children.length < 10) {
                corpo.innerHTML += `
                    <tr>
                        <td>${d.data}</td>
                        <td>${d.codigo}</td>
                        <td><strong>${d.placa}</strong></td>
                        <td>${d.destino}</td>
                        <td><span class="badge ${d.status === 'FINALIZADO' ? 'status-finalizado' : 'status-viagem'}">${d.status}</span></td>
                    </tr>
                `;
            }
        });

        // Atualizar Indicadores
        document.getElementById('totalVeiculos').innerText = resumo.placas.size;
        document.getElementById('totalExp').innerText = resumo.exp;
        document.getElementById('totalPeso').innerText = (resumo.peso / 1000).toFixed(1);

        renderizarGraficos(resumo);
    }

    function renderizarGraficos(dados) {
        if(chart1) chart1.destroy();
        if(chart2) chart2.destroy();

        // Gráfico de Destinos (Barras)
        chart1 = new Chart(document.getElementById('chartDestino'), {
            type: 'bar',
            data: {
                labels: Object.keys(dados.destinos),
                datasets: [{ label: 'Cargas', data: Object.values(dados.destinos), backgroundColor: '#d32f2f' }]
            },
            options: { responsive: true, plugins: { legend: { display: false } } }
        });

        // Gráfico de Tipos de Veículo (Pizza)
        chart2 = new Chart(document.getElementById('chartTipos'), {
            type: 'doughnut',
            data: {
                labels: Object.keys(dados.tipos),
                datasets: [{ data: Object.values(dados.tipos), backgroundColor: ['#2e7d32', '#1565c0', '#fbc02d', '#6a1b9a', '#ef6c00'] }]
            }
        });
    }

    document.getElementById('btnFiltrar').onclick = carregarDashboard;
    document.getElementById('btnSair').onclick = () => signOut(auth);
</script>
</body>
</html>
