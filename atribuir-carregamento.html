<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atribuir Carregamento - Simonetti</title>
    <style>
        :root { --primary: #d32f2f; --bg-body: #fdf2f2; --text: #333; }
        body { font-family: sans-serif; background: var(--bg-body); margin: 0; padding: 15px; }
        header { background: var(--primary); color: white; padding: 15px; margin: -15px -15px 15px -15px; font-weight: bold; text-align: center; }
        
        .card { background: white; padding: 15px; border-radius: 8px; margin-bottom: 15px; border: 1px solid #f0d8d8; }
        h3 { color: var(--primary); font-size: 16px; margin-top: 0; }
        
        label { display: block; margin: 10px 0 5px; font-weight: bold; font-size: 13px; }
        select { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 4px; }

        /* Lista de Seleção de Pessoas */
        .equipe-selector {
            display: grid;
            grid-template-columns: 1fr;
            gap: 10px;
            margin-top: 10px;
            max-height: 300px;
            overflow-y: auto;
            padding: 5px;
        }

        .pessoa-item {
            display: flex;
            align-items: center;
            padding: 12px;
            background: #f9f9f9;
            border: 1px solid #ddd;
            border-radius: 6px;
            cursor: pointer;
        }

        .pessoa-item input { margin-right: 15px; transform: scale(1.5); }
        .pessoa-item span { font-size: 14px; font-weight: 500; }
        .vinculo-tag { font-size: 10px; margin-left: auto; background: #eee; padding: 2px 6px; border-radius: 4px; color: #666; }

        .btn-vincular { 
            width: 100%; background: var(--primary); color: white; border: none; 
            padding: 15px; margin-top: 20px; border-radius: 4px; font-weight: bold; cursor: pointer; 
        }
    </style>
</head>
<body>

<header>VINCULAR EQUIPE DE CARGA</header>

<div class="card">
    <h3>1. Selecione a Expedição/Placa</h3>
    <select id="selectExpedicao">
        <option value="">Aguardando cargas...</option>
    </select>

    <h3 style="margin-top: 20px;">2. Quem carregou este carro?</h3>
    <div class="equipe-selector" id="listaEquipeCheck">
        </div>

    <button class="btn-vincular" id="btnSalvarVinculo">REGISTRAR CARREGAMENTO</button>
</div>

<script type="module">
    import { db, collection } from './firebase-config.js';
    import { query, where, onSnapshot, doc, updateDoc, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const selectExp = document.getElementById('selectExpedicao');
    const listaEquipe = document.getElementById('listaEquipeCheck');

    // 1. Carregar Expedições que ainda estão "EM SEPARAÇÃO"
    const qExp = query(collection(db, "expedicoes"), where("status", "==", "EM SEPARAÇÃO"));
    onSnapshot(qExp, (snapshot) => {
        selectExp.innerHTML = '<option value="">Selecione uma carga...</option>';
        snapshot.forEach(doc => {
            const d = doc.data();
            selectExp.innerHTML += `<option value="${doc.id}">${d.codigo} - Placa: ${d.placa}</option>`;
        });
    });

    // 2. Carregar Pessoas da Equipe
    const qEquipe = query(collection(db, "equipe"));
    onSnapshot(qEquipe, (snapshot) => {
        listaEquipe.innerHTML = "";
        snapshot.forEach(doc => {
            const p = doc.data();
            listaEquipe.innerHTML += `
                <label class="pessoa-item">
                    <input type="checkbox" name="membros" value="${p.nome}" data-vinculo="${p.vinculo}">
                    <span>${p.nome}</span>
                    <span class="vinculo-tag">${p.vinculo}</span>
                </label>
            `;
        });
    });

    // 3. Salvar o vínculo
    document.getElementById('btnSalvarVinculo').addEventListener('click', async () => {
        const idExp = selectExp.value;
        const selecionados = document.querySelectorAll('input[name="membros"]:checked');

        if (!idExp || selecionados.length === 0) {
            alert("Selecione a carga e pelo menos uma pessoa!");
            return;
        }

        const nomesEquipe = Array.from(selecionados).map(i => i.value);
        
        try {
            const docRef = doc(db, "expedicoes", idExp);
            await updateDoc(docRef, {
                equipe_carregamento: nomesEquipe,
                status: "EM FINALIZAÇÃO" // Muda o status após atribuir equipe
            });

            alert("Equipe vinculada com sucesso!");
            window.location.reload();
        } catch (e) {
            alert("Erro ao salvar.");
        }
    });
</script>

</body>
</html>
