<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Histórico do Sistema - Simonetti</title>
    <style>
        :root { --primary: #d32f2f; --bg-body: #fdf2f2; --white: #fff; --text: #333; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg-body); margin: 0; padding: 0; color: var(--text); }
        
        header { background: var(--primary); color: white; padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; }
        .header-left { display: flex; align-items: center; gap: 15px; }
        .btn-back { color: white; text-decoration: none; font-size: 20px; }
        .btn-sair { background: rgba(255,255,255,0.2); border: 1px solid white; color: white; padding: 5px 15px; border-radius: 4px; cursor: pointer; font-weight: bold; }

        .container { padding: 20px; max-width: 1100px; margin: auto; }
        .card { background: var(--white); padding: 20px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); margin-bottom: 20px; }
        h2 { color: var(--primary); margin-top: 0; font-size: 18px; border-bottom: 2px solid var(--bg-body); padding-bottom: 10px; }

        /* Filtros */
        .filtros-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 15px; margin-bottom: 20px; align-items: flex-end; }
        .filtros-grid label { display: block; font-size: 12px; font-weight: bold; margin-bottom: 5px; }
        .filtros-grid input, .filtros-grid select { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; }
        .btn-buscar { background: var(--primary); color: white; border: none; padding: 10px; border-radius: 4px; font-weight: bold; cursor: pointer; height: 40px; }

        /* Tabela */
        .table-wrapper { overflow-x: auto; background: white; border-radius: 8px; }
        table { width: 100%; border-collapse: collapse; min-width: 800px; }
        th { background: #f8f8f8; padding: 12px; text-align: left; font-size: 12px; color: #666; border-bottom: 2px solid #eee; }
        td { padding: 12px; border-bottom: 1px solid #eee; font-size: 13px; }

        .log-acao { font-weight: bold; color: #d32f2f; }
        .log-data { color: #666; font-size: 12px; }
        .log-user { color: #1565c0; font-weight: 500; }
    </style>
</head>
<body>

<header>
    <div class="header-left">
        <a href="menu.html" class="btn-back">⬅️</a>
        <span>Bem-vindo, <strong id="userName">...</strong></span>
    </div>
    <button class="btn-sair" id="btnSair">SAIR</button>
</header>

<div class="container">
    <div class="card">
        <h2>HISTÓRICO DE AÇÕES (LOGS)</h2>
        
        <div class="filtros-grid">
            <div>
                <label>DATA INICIAL</label>
                <input type="date" id="dataInicio">
            </div>
            <div>
                <label>DATA FINAL</label>
                <input type="date" id="dataFim">
            </div>
            <div>
                <label>FILTRAR POR AÇÃO</label>
                <select id="filtroAcao">
                    <option value="">Todas as ações</option>
                    <option value="CADASTRO">Cadastros</option>
                    <option value="EXCLUSÃO">Exclusões</option>
                    <option value="RECEBIMENTO">Recebimentos</option>
                    <option value="LOGIN">Acessos</option>
                </select>
            </div>
            <button class="btn-buscar" id="btnFiltrar">BUSCAR</button>
        </div>

        <div class="table-wrapper">
            <table>
                <thead>
                    <tr>
                        <th>DATA/HORA</th>
                        <th>USUÁRIO</th>
                        <th>AÇÃO</th>
                        <th>DETALHES DA OPERAÇÃO</th>
                    </tr>
                </thead>
                <tbody id="corpoHistorico">
                    </tbody>
            </table>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, collection, query, where, orderBy, getDocs, doc, getDoc, Timestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = { apiKey: "AIzaSyAhxv3c9aajgCYHnEJG7TS_VxKqJ06KBJg", authDomain: "logistica-exp.firebaseapp.com", projectId: "logistica-exp" };
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    // Configuração de datas automáticas ao carregar
    function configurarDatasPadrao() {
        const hoje = new Date();
        const primeiroDiaMes = new Date(hoje.getFullYear(), hoje.getMonth(), 1);
        
        document.getElementById('dataInicio').value = primeiroDiaMes.toISOString().split('T')[0];
        document.getElementById('dataFim').value = hoje.toISOString().split('T')[0];
    }

    onAuthStateChanged(auth, async (user) => {
        if (user) {
            const userDoc = await getDoc(doc(db, "usuarios", user.uid));
            if (userDoc.exists() && userDoc.data().nivel === 'admin') {
                document.getElementById('userName').innerText = userDoc.data().nome;
                configurarDatasPadrao();
                carregarLogs();
            } else {
                alert("Acesso restrito a administradores!");
                window.location.href = "menu.html";
            }
        } else { window.location.href = "index.html"; }
    });

    async function carregarLogs() {
        const corpo = document.getElementById('corpoHistorico');
        const dInicio = new Date(document.getElementById('dataInicio').value + "T00:00:00");
        const dFim = new Date(document.getElementById('dataFim').value + "T23:59:59");
        const filtroAcao = document.getElementById('filtroAcao').value;

        corpo.innerHTML = "<tr><td colspan='4'>Buscando registros...</td></tr>";

        try {
            // Consulta por data
            let q = query(
                collection(db, "historico"),
                where("data", ">=", Timestamp.fromDate(dInicio)),
                where("data", "<=", Timestamp.fromDate(dFim)),
                orderBy("data", "desc")
            );

            const snap = await getDocs(q);
            corpo.innerHTML = "";

            if (snap.empty) {
                corpo.innerHTML = "<tr><td colspan='4'>Nenhum registro encontrado neste período.</td></tr>";
                return;
            }

            snap.forEach(docLog => {
                const log = docLog.data();
                
                // Filtro manual de texto para "Ação" se selecionado
                if (filtroAcao && !log.acao.includes(filtroAcao)) return;

                const dataFormatada = log.data?.toDate().toLocaleString('pt-BR') || "---";

                corpo.innerHTML += `
                    <tr>
                        <td class="log-data">${dataFormatada}</td>
                        <td class="log-user">${log.usuario}</td>
                        <td class="log-acao">${log.acao}</td>
                        <td>${log.detalhe}</td>
                    </tr>
                `;
            });
        } catch (e) {
            console.error(e);
            corpo.innerHTML = "<tr><td colspan='4'>Erro ao carregar histórico.</td></tr>";
        }
    }

    document.getElementById('btnFiltrar').onclick = carregarLogs;
    document.getElementById('btnSair').onclick = () => signOut(auth);
</script>
</body>
</html>
