<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conferência de Destino - Simonetti</title>
    <style>
        :root { --primary: #d32f2f; --bg-body: #fdf2f2; --text: #333; }
        body { font-family: sans-serif; background: var(--bg-body); margin: 0; padding: 15px; }
        header { background: var(--primary); color: white; padding: 15px; margin: -15px -15px 15px -15px; font-weight: bold; }
        
        .card-carga { background: white; padding: 15px; border-radius: 8px; margin-bottom: 15px; border: 1px solid #f0d8d8; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .info-linha { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 14px; }
        .label { color: #666; font-weight: bold; }
        
        .btn-acao { width: 100%; padding: 12px; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .btn-conferir { background: var(--primary); color: white; }
        
        /* Modal de Avaria */
        #modalAvaria { 
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.7); align-items: center; justify-content: center;
        }
        .modal-content { background: white; width: 90%; max-width: 400px; padding: 20px; border-radius: 8px; max-height: 90vh; overflow-y: auto; }
        input, textarea { width: 100%; padding: 10px; margin: 8px 0; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        .opcional { font-size: 11px; color: #888; font-weight: normal; }
    </style>
</head>
<body>

<header>CONFERÊNCIA DE RECEBIMENTO</header>

<div id="listaCargas">
    <p style="text-align: center; color: #888;">Buscando cargas pendentes...</p>
</div>

<div id="modalAvaria">
    <div class="modal-content">
        <h3 style="color: var(--primary); margin-top: 0;">Registrar Recebimento</h3>
        
        <label><strong>Tem avaria?</strong></label>
        <select id="temAvaria" onchange="toggleCamposAvaria()">
            <option value="nao">Não (Carga OK)</option>
            <option value="sim">Sim (Registrar Itens)</option>
        </select>

        <div id="camposAvaria" style="display: none; border-top: 1px solid #eee; margin-top: 10px; padding-top: 10px;">
            <input type="text" id="prodCod" placeholder="Código do Produto">
            <textarea id="prodDesc" placeholder="Descrição da Avaria"></textarea>
            <input type="number" id="prodQtd" placeholder="Quantidade">
            
            <label>Foto da Avaria <span class="opcional">(Opcional)</span></label>
            <input type="file" id="prodFoto" accept="image/*">
        </div>

        <button class="btn-acao btn-conferir" id="btnSalvarConferencia">CONFIRMAR RECEBIMENTO</button>
        <button class="btn-acao" style="background: #eee;" onclick="fecharModal()">CANCELAR</button>
    </div>
</div>

<script type="module">
    import { db, collection } from './firebase-config.js';
    import { query, where, onSnapshot, doc, updateDoc, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    let cargaSelecionadaId = null;

    // 1. Carregar cargas que NÃO foram finalizadas ainda
    const q = query(collection(db, "expedicoes"), where("status", "==", "EM SEPARAÇÃO")); // Ou o status que você definir como 'Em Trânsito'
    
    onSnapshot(q, (snapshot) => {
        const lista = document.getElementById('listaCargas');
        lista.innerHTML = "";
        
        snapshot.forEach((doc) => {
            const item = doc.data();
            const card = `
                <div class="card-carga">
                    <div class="info-linha"><span class="label">Expedição:</span> <span>${item.codigo}</span></div>
                    <div class="info-linha"><span class="label">Placa:</span> <span>${item.placa}</span></div>
                    <div class="info-linha"><span class="label">Destino:</span> <span>${item.destino}</span></div>
                    <button class="btn-acao btn-conferir" onclick="abrirModal('${doc.id}')">CONFERIR CHEGADA</button>
                </div>
            `;
            lista.innerHTML += card;
        });
    });

    // Funções do Modal (Globais para o onclick funcionar)
    window.abrirModal = (id) => {
        cargaSelecionadaId = id;
        document.getElementById('modalAvaria').style.display = 'flex';
    };

    window.fecharModal = () => {
        document.getElementById('modalAvaria').style.display = 'none';
        document.getElementById('camposAvaria').style.display = 'none';
        document.getElementById('temAvaria').value = 'nao';
    };

    window.toggleCamposAvaria = () => {
        const select = document.getElementById('temAvaria').value;
        document.getElementById('camposAvaria').style.display = (select === 'sim') ? 'block' : 'none';
    };

    // 2. Salvar a conferência
    document.getElementById('btnSalvarConferencia').addEventListener('click', async () => {
        const temAvaria = document.getElementById('temAvaria').value;
        
        try {
            // Se tiver avaria, salva na coleção de avarias
            if (temAvaria === 'sim') {
                await addDoc(collection(db, "avarias"), {
                    expedicaoId: cargaSelecionadaId,
                    codigoProduto: document.getElementById('prodCod').value,
                    descricao: document.getElementById('prodDesc').value,
                    quantidade: document.getElementById('prodQtd').value,
                    dataRegistro: serverTimestamp()
                    // A parte da FOTO (Firebase Storage) podemos adicionar depois se você desejar implementar o upload real
                });
            }

            // Atualiza o status da expedição para FINALIZADO
            const docRef = doc(db, "expedicoes", cargaSelecionadaId);
            await updateDoc(docRef, {
                status: "FINALIZADO",
                conferidoEm: serverTimestamp()
            });

            alert("Recebimento confirmado!");
            fecharModal();
        } catch (e) {
            console.error(e);
            alert("Erro ao confirmar.");
        }
    });
</script>

</body>
</html>
