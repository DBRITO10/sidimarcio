<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conferência de Destino - Simonetti</title>
    <style>
        :root { --primary: #d32f2f; --bg-body: #fdf2f2; --white: #fff; --text: #333; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg-body); margin: 0; padding: 0; color: var(--text); }
        
        header { background: var(--primary); color: white; padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; }
        .header-left { display: flex; align-items: center; gap: 15px; }
        .btn-back { color: white; text-decoration: none; font-size: 20px; }
        .btn-sair { background: rgba(255,255,255,0.2); border: 1px solid white; color: white; padding: 5px 15px; border-radius: 4px; cursor: pointer; font-weight: bold; }

        .container { padding: 20px; max-width: 1000px; margin: auto; }
        .card { background: var(--white); padding: 20px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); margin-bottom: 20px; }
        h2 { color: var(--primary); margin-top: 0; font-size: 18px; border-bottom: 2px solid var(--bg-body); padding-bottom: 10px; }

        .filtro-central { background: #fffde7; padding: 10px; border-radius: 4px; margin-bottom: 15px; font-weight: bold; border: 1px solid #fff59d; }

        /* Lista de Cargas */
        .grid-cargas { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 15px; }
        .item-carga { background: white; border: 1px solid #ddd; padding: 15px; border-radius: 8px; position: relative; }
        .item-carga h3 { margin: 0 0 10px 0; color: var(--primary); font-size: 16px; }
        .info-p { margin: 5px 0; font-size: 14px; }
        .info-p strong { color: #555; }

        .btn-confirmar { width: 100%; background: #2e7d32; color: white; border: none; padding: 12px; border-radius: 4px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        
        /* Modal de Avaria */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 2000; align-items: center; justify-content: center; }
        .modal-content { background: white; padding: 25px; border-radius: 8px; width: 90%; max-width: 400px; }
        .modal-content input, .modal-content textarea { width: 100%; padding: 10px; margin-top: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        .btn-group { display: flex; gap: 10px; margin-top: 20px; }
        .btn-cancel { background: #757575; color: white; border: none; flex: 1; padding: 12px; border-radius: 4px; cursor: pointer; }
        .btn-save-avaria { background: var(--primary); color: white; border: none; flex: 2; padding: 12px; border-radius: 4px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<header>
    <div class="header-left">
        <a href="menu.html" class="btn-back">⬅️</a>
        <span>Bem-vindo, <strong id="userName">...</strong></span>
    </div>
    <button class="btn-sair" id="btnSair">SAIR</button>
</header>

<div class="container">
    <div class="filtro-central" id="infoCentral">
        📍 A filtrar cargas para as suas centrais vinculadas.
    </div>

    <div class="card">
        <h2>CARGAS CARREGADAS / EM TRÂNSITO</h2>
        <div class="grid-cargas" id="listaCargas">
            </div>
    </div>
</div>

<div class="modal" id="modalConferencia">
    <div class="modal-content">
        <h3 id="tituloModal">Confirmar Recebimento</h3>
        <p id="detalheCarga" style="font-size: 13px; color: #666;"></p>
        
        <label style="font-size: 14px; font-weight: bold;">Houve Avaria?</label>
        <select id="selectAvaria" onchange="toggleCamposAvaria()" style="width: 100%; padding: 10px; margin-top: 5px;">
            <option value="nao">Não, carga 100% OK</option>
            <option value="sim">Sim, registar avaria</option>
        </select>

        <div id="camposAvaria" style="display: none;">
            <input type="text" id="prodCod" placeholder="Código do Produto">
            <textarea id="prodDesc" placeholder="Descrição do problema (ex: caixa amassada)"></textarea>
            <input type="number" id="prodQtd" placeholder="Quantidade avariada">
        </div>

        <div class="btn-group">
            <button class="btn-cancel" onclick="fecharModal()">CANCELAR</button>
            <button class="btn-save-avaria" id="btnFinalizar">FINALIZAR BAIXA</button>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, collection, doc, getDoc, updateDoc, addDoc, onSnapshot, query, where, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = { apiKey: "AIzaSyAhxv3c9aajgCYHnEJG7TS_VxKqJ06KBJg", authDomain: "logistica-exp.firebaseapp.com", projectId: "logistica-exp" };
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    let usuarioDados = null;
    let cargaSelecionadaId = null;

    async function registrarLog(acao, detalhe) {
        await addDoc(collection(db, "historico"), {
            usuario: auth.currentUser.email,
            acao: acao,
            detalhe: detalhe,
            data: serverTimestamp()
        });
    }

    onAuthStateChanged(auth, async (user) => {
        if (user) {
            const userDoc = await getDoc(doc(db, "usuarios", user.uid));
            if (userDoc.exists()) {
                usuarioDados = userDoc.data();
                document.getElementById('userName').innerText = usuarioDados.nome;
                carregarCargas();
            }
        } else { window.location.href = "index.html"; }
    });

    function carregarCargas() {
        // Regra: Status "CARREGADO/EM VIAGEM"
        const q = query(collection(db, "expedicoes"), where("status", "==", "CARREGADO/EM VIAGEM"));
        
        onSnapshot(q, (snap) => {
            const container = document.getElementById('listaCargas');
            container.innerHTML = "";
            
            snap.forEach(d => {
                const data = d.data();
                
                // Filtro: Se o usuário for Admin mostra todas, se não, filtra pela central dele
                const centralDoUsuario = usuarioDados.central || ""; // Ex: "107-EUNAPOLIS"
                const centralCarga = data.destino;
                
                // Suporte para múltiplas centrais (separadas por vírgula se houver no cadastro do usuário)
                if (usuarioDados.nivel === 'admin' || centralDoUsuario.includes(centralCarga)) {
                    container.innerHTML += `
                        <div class="item-carga">
                            <h3>📦 Exp: ${data.codigo}</h3>
                            <p class="info-p"><strong>Placa:</strong> ${data.placa} (${data.tipo})</p>
                            <p class="info-p"><strong>Destino:</strong> ${data.destino}</p>
                            <p class="info-p"><strong>Equipa:</strong> ${data.equipe_carregamento?.join(', ')}</p>
                            <button class="btn-confirmar" onclick="abrirModal('${d.id}', '${data.codigo}', '${data.placa}')">CONFIRMAR RECEBIMENTO</button>
                        </div>
                    `;
                }
            });

            if (container.innerHTML === "") {
                container.innerHTML = "<p style='color: #666;'>Nenhuma carga em trânsito para a sua unidade.</p>";
            }
        });
    }

    window.abrirModal = (id, codigo, placa) => {
        cargaSelecionadaId = id;
        document.getElementById('detalheCarga').innerText = `Expedição: ${codigo} | Placa: ${placa}`;
        document.getElementById('modalConferencia').style.display = 'flex';
    };

    window.fecharModal = () => {
        document.getElementById('modalConferencia').style.display = 'none';
        document.getElementById('camposAvaria').style.display = 'none';
        document.getElementById('selectAvaria').value = 'nao';
    };

    window.toggleCamposAvaria = () => {
        const val = document.getElementById('selectAvaria').value;
        document.getElementById('camposAvaria').style.display = (val === 'sim') ? 'block' : 'none';
    };

    document.getElementById('btnFinalizar').onclick = async () => {
        const valAvaria = document.getElementById('selectAvaria').value;
        
        try {
            if (valAvaria === 'sim') {
                await addDoc(collection(db, "avarias"), {
                    expedicaoId: cargaSelecionadaId,
                    codigoProduto: document.getElementById('prodCod').value,
                    descricao: document.getElementById('prodDesc').value,
                    quantidade: document.getElementById('prodQtd').value,
                    dataRegistro: serverTimestamp(),
                    usuario: usuarioDados.nome
                });
            }

            // Finaliza a carga
            await updateDoc(doc(db, "expedicoes", cargaSelecionadaId), {
                status: "FINALIZADO",
                recebidoPor: usuarioDados.nome,
                dataRecebimento: serverTimestamp()
            });

            await registrarLog("RECEBIMENTO", `Carga ${cargaSelecionadaId} recebida em ${usuarioDados.central}`);
            alert("Recebimento concluído com sucesso!");
            fecharModal();
        } catch (e) { alert("Erro ao confirmar."); }
    };

    document.getElementById('btnSair').onclick = () => signOut(auth);
</script>
</body>
</html>
