<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conferência de Destino - Gestão de Qualidade</title>
    <style>
        :root { --primary: #d32f2f; --bg-body: #fdf2f2; --white: #fff; --text: #333; --success: #2e7d32; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg-body); margin: 0; padding: 0; color: var(--text); }
        
        header { background: var(--primary); color: white; padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; }
        .btn-back { color: white; text-decoration: none; font-size: 20px; }
        .btn-sair { background: rgba(255,255,255,0.2); border: 1px solid white; color: white; padding: 5px 15px; border-radius: 4px; cursor: pointer; font-weight: bold; }

        .container { padding: 20px; max-width: 1000px; margin: auto; }
        .card { background: var(--white); padding: 20px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); margin-bottom: 20px; }
        h2 { color: var(--primary); margin-top: 0; font-size: 18px; border-bottom: 2px solid var(--bg-body); padding-bottom: 10px; }

        .filtro-central { background: #fffde7; padding: 10px; border-radius: 4px; margin-bottom: 15px; font-weight: bold; border: 1px solid #fff59d; font-size: 13px; }

        /* Grid de Cargas */
        .grid-cargas { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 15px; }
        .item-carga { background: white; border: 1px solid #ddd; padding: 15px; border-radius: 8px; transition: 0.3s; }
        .item-carga:hover { border-color: var(--primary); box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .item-carga h3 { margin: 0 0 10px 0; color: var(--primary); font-size: 16px; }
        .info-p { margin: 5px 0; font-size: 14px; }

        .btn-confirmar { width: 100%; background: var(--success); color: white; border: none; padding: 12px; border-radius: 4px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        
        /* Modal de Alta Gestão */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 2000; align-items: center; justify-content: center; }
        .modal-content { 
            background: white; padding: 25px; border-radius: 8px; width: 95%; max-width: 500px; 
            max-height: 90vh; overflow-y: auto; position: relative;
        }

        .modal-content input, .modal-content textarea, .modal-content select { 
            width: 100%; padding: 10px; margin-top: 8px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; 
        }

        /* Card de Item Avariado */
        .item-avaria-card { 
            background: #fdfdfd; border: 1px solid #e0e0e0; padding: 15px; 
            border-radius: 6px; margin-top: 15px; position: relative; border-left: 4px solid var(--primary);
        }
        .remove-item { color: var(--primary); cursor: pointer; font-size: 11px; font-weight: bold; float: right; text-decoration: underline; }
        
        .btn-add-item { 
            background: #1976d2; color: white; border: none; padding: 10px; 
            border-radius: 4px; cursor: pointer; width: 100%; margin: 15px 0; font-weight: bold; font-size: 13px;
        }

        .foto-preview { width: 100%; height: 120px; object-fit: cover; border-radius: 4px; margin-top: 8px; display: none; border: 1px solid #ddd; }

        .btn-group { display: flex; gap: 10px; margin-top: 25px; position: sticky; bottom: 0; background: white; padding-top: 10px; }
        .btn-cancel { background: #757575; color: white; border: none; flex: 1; padding: 12px; border-radius: 4px; cursor: pointer; font-weight: bold; }
        .btn-save-avaria { background: var(--primary); color: white; border: none; flex: 2; padding: 12px; border-radius: 4px; cursor: pointer; font-weight: bold; }
        
        .loading-overlay { display: none; position: absolute; top:0; left:0; width:100%; height:100%; background: rgba(255,255,255,0.8); z-index: 10; justify-content: center; align-items: center; font-weight: bold; color: var(--primary); }
    </style>
</head>
<body>

<header>
    <div class="header-left">
        <a href="menu.html" class="btn-back">⬅️</a>
        <span>Bem-vindo, <strong id="userName">...</strong></span>
    </div>
    <button class="btn-sair" id="btnSair">SAIR</button>
</header>

<div class="container">
    <div class="filtro-central" id="infoCentral">
        📍 Filtrando cargas destinadas à sua unidade de operação.
    </div>

    <div class="card">
        <h2>CARGAS EM TRÂNSITO</h2>
        <div class="grid-cargas" id="listaCargas">
            <p style="text-align:center; width:100%;">Carregando expedições...</p>
        </div>
    </div>
</div>

<div class="modal" id="modalConferencia">
    <div class="modal-content">
        <div class="loading-overlay" id="loadingModal">PROCESSANDO...</div>
        
        <h3 id="tituloModal" style="margin-top:0; color: var(--primary);">Conferência de Recebimento</h3>
        <p id="detalheCarga" style="font-size: 13px; color: #666; background: #eee; padding: 8px; border-radius: 4px;"></p>
        
        <div style="margin-top: 15px;">
            <label style="font-size: 14px; font-weight: bold;">Status da Entrega:</label>
            <select id="selectAvaria" onchange="toggleCamposAvaria()">
                <option value="nao">✅ CARGA 100% OK (SEM AVARIAS)</option>
                <option value="sim">⚠️ POSSUI ITENS COM AVARIA / FALTA</option>
            </select>
        </div>

        <div id="containerAvarias" style="display: none;">
            <div id="listaItensAvaria">
                </div>
            <button class="btn-add-item" id="btnAddItem">+ ADICIONAR PRODUTO AVARIADO</button>
        </div>

        <div class="btn-group">
            <button class="btn-cancel" id="btnCancelar">CANCELAR</button>
            <button class="btn-save-avaria" id="btnFinalizar">FINALIZAR BAIXA</button>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, collection, doc, getDoc, updateDoc, addDoc, onSnapshot, query, where, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
    import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";

    const firebaseConfig = { 
        apiKey: "AIzaSyAhxv3c9aajgCYHnEJG7TS_VxKqJ06KBJg", 
        authDomain: "logistica-exp.firebaseapp.com", 
        projectId: "logistica-exp",
        storageBucket: "logistica-exp.appspot.com" // Verifique se este é o seu bucket correto
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const storage = getStorage(app);

    let usuarioDados = null;
    let cargaSelecionadaId = null;

    // --- AUTENTICAÇÃO ---
    onAuthStateChanged(auth, async (user) => {
        if (user) {
            const userDoc = await getDoc(doc(db, "usuarios", user.uid));
            if (userDoc.exists()) {
                usuarioDados = userDoc.data();
                document.getElementById('userName').innerText = usuarioDados.nome;
                carregarCargas();
            }
        } else { window.location.href = "index.html"; }
    });

    document.getElementById('btnSair').onclick = () => signOut(auth);

    // --- CARREGAR CARGAS ---
    function carregarCargas() {
        const q = query(collection(db, "expedicoes"), where("status", "==", "CARREGADO/EM VIAGEM"));
        
        onSnapshot(q, (snap) => {
            const container = document.getElementById('listaCargas');
            container.innerHTML = "";
            
            snap.forEach(d => {
                const data = d.data();
                const centralDoUsuario = usuarioDados.central || "";
                
                if (usuarioDados.nivel === 'admin' || centralDoUsuario.includes(data.destino)) {
                    container.innerHTML += `
                        <div class="item-carga">
                            <h3>📦 Exp: ${data.codigo || data.expedicao}</h3>
                            <p class="info-p"><strong>Placa:</strong> ${data.placa}</p>
                            <p class="info-p"><strong>Destino:</strong> ${data.destino}</p>
                            <button class="btn-confirmar" onclick="abrirModal('${d.id}', '${data.codigo || data.expedicao}', '${data.placa}')">CONFERIR RECEBIMENTO</button>
                        </div>
                    `;
                }
            });
        });
    }

    // --- LÓGICA DO MODAL ---
    window.abrirModal = (id, codigo, placa) => {
        cargaSelecionadaId = id;
        document.getElementById('listaItensAvaria').innerHTML = "";
        document.getElementById('detalheCarga').innerText = `Expedição: ${codigo} | Veículo: ${placa}`;
        document.getElementById('modalConferencia').style.display = 'flex';
        document.getElementById('selectAvaria').value = 'nao';
        toggleCamposAvaria();
    };

    window.fecharModal = () => {
        document.getElementById('modalConferencia').style.display = 'none';
    };

    window.toggleCamposAvaria = () => {
        const val = document.getElementById('selectAvaria').value;
        document.getElementById('containerAvarias').style.display = (val === 'sim') ? 'block' : 'none';
        if (val === 'sim' && document.getElementById('listaItensAvaria').children.length === 0) {
            adicionarItemAvaria();
        }
    };

    window.adicionarItemAvaria = () => {
        const idUnico = Date.now();
        const itemHtml = `
            <div class="item-avaria-card" id="item_${idUnico}">
                <span class="remove-item" onclick="document.getElementById('item_${idUnico}').remove()">X REMOVER ITEM</span>
                <input type="text" class="p-cod" placeholder="Código do Produto" required>
                <input type="text" class="p-nome" placeholder="Nome/Descrição do Produto" required>
                <div style="display: flex; gap: 8px;">
                    <input type="number" class="p-qtd" placeholder="Qtd" style="flex: 1;" required>
                    <select class="p-motivo" style="flex: 2;">
                        <option value="">Selecione o Motivo...</option>
                        <option value="Amassado">📦 Amassado</option>
                        <option value="Quebrado">❌ Quebrado/Rachado</option>
                        <option value="Molhado">💧 Molhado</option>
                        <option value="Falta">🔍 Falta/Extravio</option>
                    </select>
                </div>
                <textarea class="p-obs" placeholder="Detalhes do problema..."></textarea>
                <input type="file" class="p-foto" accept="image/*" onchange="previewImg(this, ${idUnico})">
                <img id="prev_${idUnico}" class="foto-preview">
            </div>
        `;
        document.getElementById('listaItensAvaria').insertAdjacentHTML('beforeend', itemHtml);
    };

    window.previewImg = (input, id) => {
        const prev = document.getElementById(`prev_${id}`);
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = (e) => { prev.src = e.target.result; prev.style.display = 'block'; };
            reader.readAsDataURL(input.files[0]);
        }
    };

    // --- FINALIZAR E SALVAR (ALTA GESTÃO) ---
    document.getElementById('btnFinalizar').onclick = async () => {
        const valAvaria = document.getElementById('selectAvaria').value;
        const loading = document.getElementById('loadingModal');
        
        loading.style.display = 'flex';

        try {
            if (valAvaria === 'sim') {
                const cards = document.querySelectorAll('.item-avaria-card');
                
                for (let card of cards) {
                    const fileInput = card.querySelector('.p-foto');
                    let fotoUrl = "";

                    // Upload Foto
                    if (fileInput.files[0]) {
                        const storageRef = ref(storage, `avarias/${cargaSelecionadaId}_${Date.now()}`);
                        await uploadBytes(storageRef, fileInput.files[0]);
                        fotoUrl = await getDownloadURL(storageRef);
                    }

                    // Salva na coleção Avarias
                    await addDoc(collection(db, "avarias"), {
                        expedicaoId: cargaSelecionadaId,
                        codigoProduto: card.querySelector('.p-cod').value,
                        nomeProduto: card.querySelector('.p-nome').value,
                        quantidade: card.querySelector('.p-qtd').value,
                        motivo: card.querySelector('.p-motivo').value,
                        descricao: card.querySelector('.p-obs').value,
                        fotoUrl: fotoUrl,
                        usuario: usuarioDados.nome,
                        central: usuarioDados.central,
                        dataRegistro: serverTimestamp()
                    });
                }
            }

            // Atualiza Expedição
            await updateDoc(doc(db, "expedicoes", cargaSelecionadaId), {
                status: "FINALIZADO",
                dataRecebimento: serverTimestamp(),
                recebidoPor: usuarioDados.nome,
                teveAvaria: (valAvaria === 'sim')
            });

            // Registro no Histórico
            await addDoc(collection(db, "historico"), {
                acao: "RECEBIMENTO",
                detalhe: `Carga ${cargaSelecionadaId} recebida em ${usuarioDados.central}. Avarias: ${valAvaria}`,
                usuario: auth.currentUser.email,
                data: serverTimestamp()
            });

            alert("Baixa concluída com sucesso!");
            fecharModal();
        } catch (e) {
            console.error(e);
            alert("Erro ao processar baixa.");
        } finally {
            loading.style.display = 'none';
        }
    };

    document.getElementById('btnCancelar').onclick = fecharModal;
    document.getElementById('btnAddItem').onclick = adicionarItemAvaria;
    window.toggleCamposAvaria = toggleCamposAvaria;

</script>    
</body>
</html>
