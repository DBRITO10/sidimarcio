<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Frota - Simonetti</title>
    <style>
        :root {
            --primary: #d32f2f;
            --bg-body: #fdf2f2;
            --white: #ffffff;
            --text: #333;
            --shadow: 0 4px 12px rgba(0,0,0,0.1);
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--bg-body);
            margin: 0;
            padding: 0;
        }

        /* Header com botão voltar e sair conforme solicitado */
        header {
            background-color: var(--primary);
            color: var(--white);
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .header-left { display: flex; align-items: center; gap: 15px; }
        .btn-back { color: white; text-decoration: none; font-size: 20px; }
        
        .btn-sair {
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid var(--white);
            color: var(--white);
            padding: 5px 15px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
        }

        .container {
            padding: 20px;
            max-width: 800px;
            margin: auto;
        }

        .card {
            background: var(--white);
            padding: 20px;
            border-radius: 8px;
            box-shadow: var(--shadow);
            margin-bottom: 20px;
        }

        h2 { color: var(--primary); margin-top: 0; font-size: 18px; border-bottom: 2px solid var(--bg-body); padding-bottom: 10px; }

        label { display: block; margin-top: 15px; font-weight: bold; font-size: 13px; }
        
        input, select {
            width: 100%;
            padding: 12px;
            margin-top: 5px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
            text-transform: uppercase;
        }

        .btn-salvar {
            width: 100%;
            background: var(--primary);
            color: white;
            border: none;
            padding: 15px;
            margin-top: 20px;
            border-radius: 4px;
            font-weight: bold;
            cursor: pointer;
        }

        /* Tabela Responsiva */
        .table-container {
            overflow-x: auto;
            background: white;
            border-radius: 8px;
        }

        table { width: 100%; border-collapse: collapse; min-width: 400px; }
        th { background: #f8f8f8; padding: 12px; text-align: left; font-size: 13px; color: #666; }
        td { padding: 12px; border-bottom: 1px solid #eee; font-size: 14px; }

        .btn-delete {
            background: #ffcdd2;
            color: #c62828;
            border: none;
            padding: 5px 10px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 11px;
            font-weight: bold;
        }
    </style>
</head>
<body>

<header>
    <div class="header-left">
        <a href="menu.html" class="btn-back">⬅️</a>
        <span>Bem-vindo, <strong id="userName">...</strong></span>
    </div>
    <button class="btn-sair" id="btnSair">SAIR</button>
</header>

<div class="container">
    <div class="card">
        <h2>CADASTRAR VEÍCULO (PLACA)</h2>
        <form id="formVeiculo">
            <label>PLACA DO VEÍCULO</label>
            <input type="text" id="placa" placeholder="ABC-1234" maxlength="8" required>

            <label>TIPO DE VEÍCULO</label>
            <select id="tipoVeiculo" required>
                <option value="">SELECIONE O TIPO</option>
                <option value="CARRETA">CARRETA</option>
                <option value="TRUCK">TRUCK</option>
                <option value="TOCO">TOCO</option>
                <option value="3/4">3/4</option>
                <option value="VLC">VLC</option>
            </select>

            <button type="submit" class="btn-salvar" id="btnSalvar">CADASTRAR VEÍCULO</button>
        </form>
    </div>

    <div class="card table-container">
        <h2>FROTA CADASTRADA</h2>
        <table>
            <thead>
                <tr>
                    <th>PLACA</th>
                    <th>TIPO</th>
                    <th style="text-align: right;">AÇÃO</th>
                </tr>
            </thead>
            <tbody id="corpoTabela">
                </tbody>
        </table>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, doc, getDoc, collection, addDoc, onSnapshot, deleteDoc, query, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAhxv3c9aajgCYHnEJG7TS_VxKqJ06KBJg",
        authDomain: "logistica-exp.firebaseapp.com",
        projectId: "logistica-exp"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    // Função para registrar log no Histórico
    async function registrarLog(acao, detalhe) {
        try {
            await addDoc(collection(db, "historico"), {
                usuario: auth.currentUser.email,
                acao: acao,
                detalhe: detalhe,
                data: serverTimestamp()
            });
        } catch (e) { console.error("Erro log:", e); }
    }

    // Controle de Acesso e Header
    onAuthStateChanged(auth, async (user) => {
        if (user) {
            const userDoc = await getDoc(doc(db, "usuarios", user.uid));
            if (userDoc.exists()) {
                const userData = userDoc.data();
                document.getElementById('userName').innerText = userData.nome;
                
                // Só Admin entra aqui
                if (userData.nivel !== 'admin') {
                    alert("Acesso restrito ao Administrador.");
                    window.location.href = "menu.html";
                }
            }
        } else { window.location.href = "index.html"; }
    });

    // Salvar Veículo
    document.getElementById('formVeiculo').addEventListener('submit', async (e) => {
        e.preventDefault();
        const placa = document.getElementById('placa').value.toUpperCase().replace("-", "");
        const tipo = document.getElementById('tipoVeiculo').value;
        const btn = document.getElementById('btnSalvar');

        btn.disabled = true;
        btn.innerText = "SALVANDO...";

        try {
            await addDoc(collection(db, "cad_veiculos"), {
                placa: placa,
                tipo: tipo,
                criadoEm: serverTimestamp()
            });

            await registrarLog("CADASTRO VEÍCULO", `Cadastrou placa ${placa} do tipo ${tipo}`);
            
            alert("Veículo cadastrado!");
            e.target.reset();
        } catch (error) {
            alert("Erro ao cadastrar.");
        } finally {
            btn.disabled = false;
            btn.innerText = "CADASTRAR VEÍCULO";
        }
    });

    // Listar Frota em Tempo Real
    onSnapshot(query(collection(db, "cad_veiculos"), orderBy("criadoEm", "desc")), (snapshot) => {
        const corpo = document.getElementById('corpoTabela');
        corpo.innerHTML = "";
        snapshot.forEach((docSnap) => {
            const v = docSnap.data();
            corpo.innerHTML += `
                <tr>
                    <td><strong>${v.placa}</strong></td>
                    <td>${v.tipo}</td>
                    <td style="text-align: right;">
                        <button class="btn-delete" onclick="excluirVeiculo('${docSnap.id}', '${v.placa}')">EXCLUIR</button>
                    </td>
                </tr>
            `;
        });
    });

    // Função Excluir (Global para o onclick)
    window.excluirVeiculo = async (id, placa) => {
        if (confirm(`Deseja excluir o veículo ${placa}?`)) {
            await deleteDoc(doc(db, "cad_veiculos", id));
            await registrarLog("EXCLUSÃO VEÍCULO", `Removeu a placa ${placa}`);
        }
    };

    // Logout
    document.getElementById('btnSair').onclick = () => signOut(auth);

</script>

</body>
</html>
