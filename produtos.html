<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Produtos - Simonetti</title>
    <style>
        :root { --primary: #d32f2f; --bg-body: #fdf2f2; --white: #fff; --text: #333; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg-body); margin: 0; padding: 0; color: var(--text); }
        
        /* Cabeçalho Padronizado */
        header { 
            background: var(--primary); color: white; padding: 10px 20px; 
            display: flex; justify-content: space-between; align-items: center; 
            position: sticky; top: 0; z-index: 1000; box-shadow: 0 2px 5px rgba(0,0,0,0.2); 
        }
        .header-left { display: flex; align-items: center; gap: 15px; }
        .btn-back { color: white; text-decoration: none; font-size: 20px; background: rgba(255,255,255,0.1); padding: 5px 10px; border-radius: 5px; }
        .btn-sair { background: rgba(255,255,255,0.2); border: 1px solid white; color: white; padding: 5px 15px; border-radius: 4px; cursor: pointer; font-weight: bold; }

        .container { padding: 20px; max-width: 800px; margin: auto; }
        .card { background: var(--white); padding: 20px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); margin-bottom: 20px; }
        
        h2, h3 { color: var(--primary); margin-top: 0; font-size: 18px; }
        
        input { width: 100%; padding: 12px; margin-top: 10px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; font-size: 14px; }
        .btn-add { background: var(--primary); color: white; border: none; padding: 14px; width: 100%; border-radius: 6px; cursor: pointer; font-weight: bold; margin-top: 15px; transition: 0.3s; }
        .btn-add:hover { background: #b71c1c; }

        /* Tabela Responsiva */
        .table-wrapper { overflow-x: auto; margin-top: 10px; }
        table { width: 100%; border-collapse: collapse; background: white; font-size: 14px; }
        th { background: #f8f8f8; padding: 12px; text-align: left; font-size: 12px; color: #666; border-bottom: 2px solid #eee; text-transform: uppercase; }
        td { padding: 12px; border-bottom: 1px solid #eee; }

        .btn-edit { color: #fbc02d; cursor: pointer; margin-right: 15px; font-size: 18px; }
        .btn-del { color: #f44336; cursor: pointer; font-size: 18px; }

        @media (max-width: 600px) {
            .container { padding: 10px; }
            header { padding: 10px; }
            span { font-size: 12px; }
        }
    </style>
</head>
<body>

<header>
    <div class="header-left">
        <a href="menu.html" class="btn-back">⬅️</a>
        <span>Olá, <strong id="userName">...</strong></span>
    </div>
    <button class="btn-sair" id="btnSair">SAIR</button>
</header>

<div class="container">
    <div class="card">
        <h3>📦 Gerenciar Lista de Produtos</h3>
        <p style="font-size: 12px; color: #666;">Cadastre ou edite produtos para que apareçam na conferência.</p>
        <input type="text" id="prodCodigo" placeholder="Código do Produto (Ex: 1010)">
        <input type="text" id="prodNome" placeholder="Descrição / Nome do Produto">
        <button class="btn-add" id="btnSalvar">SALVAR PRODUTO</button>
    </div>

    <div class="card">
        <input type="text" id="inputBusca" placeholder="🔍 Buscar por código ou nome..." onkeyup="filtrar()">
        <div class="table-wrapper">
            <table id="tabelaProdutos">
                <thead>
                    <tr>
                        <th>Código</th>
                        <th>Descrição</th>
                        <th style="text-align: center;">Ações</th>
                    </tr>
                </thead>
                <tbody id="listaProdutos">
                    <tr><td colspan="3" style="text-align: center; padding: 20px;">Carregando lista...</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, updateDoc, serverTimestamp, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    const firebaseConfig = { apiKey: "AIzaSyAhxv3c9aajgCYHnEJG7TS_VxKqJ06KBJg", authDomain: "logistica-exp.firebaseapp.com", projectId: "logistica-exp" };
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    let produtos = [];
    let editandoId = null;

    // Autenticação e Carregamento de Nome
    onAuthStateChanged(auth, async (user) => {
        if (user) {
            const userDoc = await getDoc(doc(db, "usuarios", user.uid));
            if (userDoc.exists()) {
                document.getElementById('userName').innerText = userDoc.data().nome.split(' ')[0].toUpperCase();
                carregarProdutos();
            }
        } else {
            window.location.href = "index.html";
        }
    });

    async function carregarProdutos() {
        const snap = await getDocs(collection(db, "produtos_lista"));
        produtos = [];
        const tbody = document.getElementById('listaProdutos');
        tbody.innerHTML = "";
        
        if (snap.empty) {
            tbody.innerHTML = "<tr><td colspan='3' style='text-align:center;'>Nenhum produto cadastrado.</td></tr>";
            return;
        }

        snap.forEach(d => {
            const p = { id: d.id, ...d.data() };
            produtos.push(p);
            tbody.innerHTML += `
                <tr>
                    <td><strong>${p.codigo}</strong></td>
                    <td>${p.nome}</td>
                    <td style="text-align: center;">
                        <span class="btn-edit" onclick="editarProduto('${p.id}', '${p.codigo}', '${p.nome}')">✏️</span>
                        <span class="btn-del" onclick="excluirProduto('${p.id}', '${p.codigo}')">🗑️</span>
                    </td>
                </tr>`;
        });
    }

    document.getElementById('btnSalvar').onclick = async () => {
        const cod = document.getElementById('prodCodigo').value.trim();
        const nome = document.getElementById('prodNome').value.trim();
        const btn = document.getElementById('btnSalvar');

        if(!cod || !nome) return alert("Por favor, preencha o código e o nome do produto.");

        btn.disabled = true;
        btn.innerText = "PROCESSANDO...";

        try {
            if(editandoId) {
                await updateDoc(doc(db, "produtos_lista", editandoId), { 
                    codigo: cod, 
                    nome: nome.toUpperCase() 
                });
                await registrarHistorico(`EDITOU PRODUTO: ${cod}`);
                editandoId = null;
                btn.style.background = "var(--primary)";
                btn.innerText = "SALVAR PRODUTO";
            } else {
                await addDoc(collection(db, "produtos_lista"), { 
                    codigo: cod, 
                    nome: nome.toUpperCase() 
                });
                await registrarHistorico(`CADASTROU PRODUTO: ${cod}`);
            }
            
            document.getElementById('prodCodigo').value = "";
            document.getElementById('prodNome').value = "";
            carregarProdutos();
            alert("Sucesso!");
        } catch (e) {
            alert("Erro ao salvar.");
        } finally {
            btn.disabled = false;
            btn.innerText = editandoId ? "ATUALIZAR PRODUTO" : "SALVAR PRODUTO";
        }
    };

    window.excluirProduto = async (id, cod) => {
        if(confirm(`Deseja excluir o produto ${cod}?`)) {
            await deleteDoc(doc(db, "produtos_lista", id));
            await registrarHistorico(`EXCLUIU PRODUTO: ${cod}`);
            carregarProdutos();
        }
    };

    window.editarProduto = (id, cod, nome) => {
        document.getElementById('prodCodigo').value = cod;
        document.getElementById('prodNome').value = nome;
        editandoId = id;
        const btn = document.getElementById('btnSalvar');
        btn.innerText = "ATUALIZAR PRODUTO";
        btn.style.background = "#2e7d32"; // Muda para verde para indicar edição
        window.scrollTo({ top: 0, behavior: 'smooth' });
    };

    async function registrarHistorico(acao) {
        await addDoc(collection(db, "historico"), {
            acao: "PRODUTOS",
            detalhe: acao,
            usuario: auth.currentUser.email,
            data: serverTimestamp()
        });
    }

    window.filtrar = () => {
        const termo = document.getElementById('inputBusca').value.toLowerCase();
        const linhas = document.querySelectorAll('#listaProdutos tr');
        linhas.forEach(l => {
            if(l.cells.length > 1) {
                l.style.display = l.innerText.toLowerCase().includes(termo) ? "" : "none";
            }
        });
    };

    document.getElementById('btnSair').onclick = () => signOut(auth);
    window.editarProduto = editarProduto;
    window.excluirProduto = excluirProduto;
</script>
</body>
</html>
