<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Configurar Perfil - Simonetti</title>
    <style>
        :root { --primary: #d32f2f; --bg-body: #fdf2f2; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: var(--bg-body); padding: 20px; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        .card { background: white; padding: 30px; border-radius: 12px; max-width: 400px; width: 100%; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h2 { color: var(--primary); margin-top: 0; text-align: center; text-transform: uppercase; font-size: 20px; }
        p { text-align: center; color: #666; font-size: 14px; margin-bottom: 20px; }
        label { display: block; margin-top: 15px; font-weight: bold; font-size: 13px; color: #444; }
        input, select { width: 100%; padding: 12px; margin-top: 5px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; font-size: 14px; background: #fafafa; }
        input:focus, select:focus { border-color: var(--primary); outline: none; background: #fff; }
        .btn-salvar { width: 100%; background: var(--primary); color: white; border: none; padding: 15px; margin-top: 25px; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 14px; transition: 0.3s; }
        .btn-salvar:hover { background: #b71c1c; transform: translateY(-1px); }
        .btn-salvar:disabled { background: #ccc; cursor: not-allowed; }
        #msgInfo { text-align: center; font-size: 11px; color: #888; margin-top: 10px; display: block; }
    </style>
</head>
<body>

<div class="card">
    <h2>Configuração Inicial</h2>
    <p>Complete seus dados para acessar o sistema.</p>
    
    <form id="formPerfil">
        <label>Nome de Usuário</label>
        <input type="text" id="nomeUser" placeholder="Digite seu nome completo" required>

        <label>Nova Senha de Acesso</label>
        <input type="password" id="novaSenha" placeholder="Mínimo 6 caracteres" required minlength="6">

        <label>Tipo de Função</label>
        <select id="funcaoUser" required>
            <option value="" disabled selected>Selecione sua função...</option>
            <option value="leitor">Leitor</option>
        </select>

        <label>Sua Central (Origem/Vínculo)</label>
        <select id="centralUser" required>
            <option value="" disabled selected>Carregando centrais...</option>
        </select>

        <button type="submit" id="btnFinalizar" class="btn-salvar">FINALIZAR E ENTRAR</button>
        <span id="msgInfo">Aguardando preenchimento...</span>
    </form>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, onAuthStateChanged, updatePassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, doc, setDoc, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = { 
        apiKey: "AIzaSyAhxv3c9aajgCYHnEJG7TS_VxKqJ06KBJg", 
        authDomain: "logistica-exp.firebaseapp.com", 
        projectId: "logistica-exp" 
    };
    
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    let currentUser = null;

    // Monitora login e carrega centrais dinâmicas da coleção 'destinos'
    onAuthStateChanged(auth, async (user) => {
        if (user) { 
            currentUser = user; 
            await carregarCentraisDoBanco();
        } else { 
            window.location.href = "index.html"; 
        }
    });

    async function carregarCentraisDoBanco() {
        const select = document.getElementById('centralUser');
        try {
            // Conecta na coleção 'destinos' conforme solicitado
            const querySnapshot = await getDocs(collection(db, "destinos"));
            select.innerHTML = '<option value="" disabled selected>Selecione sua Central</option>';
            
            if(querySnapshot.empty) {
                // Fallback caso a coleção esteja vazia momentaneamente
                const padrao = ["MATRIZ", "SERRA 113", "CONQUISTA", "BUERAREMA"];
                padrao.forEach(c => select.innerHTML += `<option value="${c}">${c}</option>`);
            } else {
                querySnapshot.forEach((doc) => {
                    const dados = doc.data();
                    // Pega o campo 'nome' dentro do documento de destino
                    if(dados.nome) {
                        select.innerHTML += `<option value="${dados.nome}">${dados.nome}</option>`;
                    }
                });
            }
        } catch (error) {
            console.error("Erro ao carregar destinos:", error);
            document.getElementById('msgInfo').innerText = "Erro ao carregar lista de centrais.";
        }
    }

    document.getElementById('formPerfil').addEventListener('submit', async (e) => {
        e.preventDefault();
        const btn = document.getElementById('btnFinalizar');
        const novaSenha = document.getElementById('novaSenha').value;
        const msg = document.getElementById('msgInfo');
        
        btn.innerText = "PROCESSANDO...";
        btn.disabled = true;

        try {
            // 1. Atualiza a senha no Firebase Authentication
            await updatePassword(currentUser, novaSenha);

            // 2. Salva ou atualiza os dados na coleção 'usuarios'
            await setDoc(doc(db, "usuarios", currentUser.uid), {
                nome: document.getElementById('nomeUser').value.toUpperCase(),
                funcao: document.getElementById('funcaoUser').value,
                central: document.getElementById('centralUser').value,
                email: currentUser.email,
                nivel: "user", // Adm deve ser alterado manualmente no console
                dataConfiguracao: new Date().toISOString()
            }, { merge: true });

            alert("Cadastro finalizado com sucesso!");
            window.location.href = "dashboard.html";

        } catch (error) {
            console.error(error);
            btn.disabled = false;
            btn.innerText = "FINALIZAR E ENTRAR";
            
            if (error.code === 'auth/requires-recent-login') {
                alert("Sessão expirada. Por favor, saia e entre novamente para definir sua senha.");
            } else {
                alert("Erro ao salvar: " + error.message);
            }
        }
    });
</script>
</body>
</html>
