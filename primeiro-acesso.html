<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Configurar Perfil - Simonetti</title>
    <style>
        :root { --primary: #d32f2f; --bg-body: #fdf2f2; }
        body { font-family: sans-serif; background: var(--bg-body); padding: 20px; }
        .card { background: white; padding: 25px; border-radius: 8px; max-width: 400px; margin: auto; }
        h2 { color: var(--primary); margin-top: 0; }
        label { display: block; margin-top: 15px; font-weight: bold; }
        input, select { width: 100%; padding: 12px; margin-top: 5px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        .btn-salvar { width: 100%; background: var(--primary); color: white; border: none; padding: 15px; margin-top: 25px; border-radius: 4px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div class="card">
    <h2>Bem-vindo!</h2>
    <p>Complete seu cadastro para continuar.</p>
    
    <form id="formPerfil">
        <label>Nome de Usuário</label>
        <input type="text" id="nomeUser" placeholder="Ex: João da Central" required>

        <label>Tipo de Função</label>
        <select id="funcaoUser">
            <option value="conferente">Conferente / Pátio</option>
            <option value="central">Responsável Central (Destino)</option>
        </select>

        <label>Vínculo / Central</label>
        <select id="centralUser">
            <option value="MATRIZ">MATRIZ</option>
            <option value="SERRA 113">CENTRAL DA SERRA 113</option>
            <option value="CONQUISTA">CONQUISTA</option>
            <option value="BURAREMA">BURAREMA</option>
        </select>

        <button type="submit" class="btn-salvar">FINALIZAR E ENTRAR</button>
    </form>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = { apiKey: "AIzaSyAhxv3c9aajgCYHnEJG7TS_VxKqJ06KBJg", authDomain: "logistica-exp.firebaseapp.com", projectId: "logistica-exp" };
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    let currentUser = null;

    onAuthStateChanged(auth, (user) => {
        if (user) { currentUser = user; } else { window.location.href = "index.html"; }
    });

    document.getElementById('formPerfil').addEventListener('submit', async (e) => {
        e.preventDefault();
        
        try {
            await setDoc(doc(db, "usuarios", currentUser.uid), {
                nome: document.getElementById('nomeUser').value,
                funcao: document.getElementById('funcaoUser').value,
                central: document.getElementById('centralUser').value,
                email: currentUser.email,
                nivel: "user" // O ADM você altera manualmente no banco para "admin"
            });

            alert("Perfil configurado!");
            window.location.href = "dashboard.html";
        } catch (error) {
            alert("Erro ao salvar perfil.");
        }
    });
</script>
</body>
</html>
