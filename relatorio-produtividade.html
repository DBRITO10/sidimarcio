<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Relatório de Qualidade - Simonetti</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    
    <style>
        :root { --primary: #d32f2f; --bg-body: #fdf2f2; --white: #fff; --danger: #c62828; --success: #2e7d32; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg-body); margin: 0; }
        
        header { 
            background: var(--primary); 
            color: white; 
            padding: 10px 20px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            position: sticky; top: 0; z-index: 1000;
        }

        .header-left { display: flex; align-items: center; gap: 15px; flex: 1; }
        .header-center { flex: 2; text-align: center; }
        .header-right { flex: 1; text-align: right; }

        .btn-header {
            background: rgba(255, 255, 255, 0.15);
            border: 1px solid white;
            color: white;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            text-decoration: none;
            font-size: 13px;
        }
        .btn-header:hover { background: white; color: var(--primary); }

        .header-title { font-size: 18px; font-weight: 800; text-transform: uppercase; margin: 0; }
        .user-badge { font-size: 13px; background: rgba(0,0,0,0.2); padding: 4px 8px; border-radius: 4px; }

        .container { padding: 20px; max-width: 1200px; margin: auto; }
        .card { background: var(--white); padding: 20px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); margin-bottom: 20px; }
        
        .filtros { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px; margin-bottom: 20px; align-items: flex-end; }
        .filtros label { font-size: 11px; font-weight: bold; color: #666; display: block; margin-bottom: 5px; }
        .filtros input, .filtros select { width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px; }

        .btn { border: none; padding: 10px 15px; border-radius: 4px; font-weight: bold; cursor: pointer; color: white; transition: 0.3s; }
        .btn-search { background: var(--primary); }
        .btn-excel { background: #1b5e20; margin-bottom: 15px; }

        table { width: 100%; border-collapse: collapse; background: white; }
        th { background: #f8f9fa; padding: 12px 10px; text-align: left; border-bottom: 2px solid #ddd; font-size: 12px; color: #444; }
        td { padding: 12px 10px; border-bottom: 1px solid #eee; font-size: 13px; vertical-align: top; }
        
        .status-ok { color: var(--success); font-weight: bold; }
        .status-avaria { color: var(--danger); font-weight: bold; }
        .detalhe-avaria { font-size: 11px; background: #fff5f5; border: 1px solid #ffcdd2; padding: 5px; border-radius: 4px; margin-top: 5px; color: #b71c1c; }
        .equipe-tag { display: inline-block; background: #eceff1; padding: 2px 6px; border-radius: 3px; font-size: 11px; margin-right: 3px; border: 1px solid #cfd8dc; margin-bottom: 2px;}
    </style>
</head>
<body>

<header>
    <div class="header-left">
        <a href="menu.html" class="btn-header">⬅ VOLTAR</a>
        <span class="user-badge" id="userName">Carregando...</span>
    </div>
    <div class="header-center">
        <h1 class="header-title">Qualidade e Carregamento</h1>
    </div>
    <div class="header-right">
        <button class="btn-header" id="btnLogout" style="border-color: #ffcdd2;">SAIR</button>
    </div>
</header>

<div class="container">
    <div class="card">
        <div class="filtros">
            <div>
                <label>DATA INICIAL</label>
                <input type="date" id="dataInicio">
            </div>
            <div>
                <label>DATA FINAL</label>
                <input type="date" id="dataFim">
            </div>
            <div>
                <label>FILTRAR VÍNCULO</label>
                <select id="filtroVinculo">
                    <option value="TODOS">TODOS OS VÍNCULOS</option>
                    <option value="MEI">SOMENTE MEI</option>
                    <option value="TERCEIRO">SOMENTE TERCEIRO</option>
                </select>
            </div>
            <button class="btn btn-search" id="btnFiltrar">ATUALIZAR TABELA</button>
        </div>

        <button class="btn btn-excel" id="btnExportExcel">📊 EXPORTAR PARA EXCEL</button>

        <div style="overflow-x: auto;">
            <table id="tabelaQualidade">
                <thead>
                    <tr>
                        <th>DATA</th>
                        <th>EXPEDIÇÃO</th>
                        <th>DESTINO</th>
                        <th>PLACA / PESO</th>
                        <th>EQUIPE (VÍNCULO)</th>
                        <th>SITUAÇÃO / AVARIA</th>
                    </tr>
                </thead>
                <tbody id="corpoTabela">
                    <tr><td colspan="6" style="text-align:center;">Clique em ATUALIZAR para carregar os dados.</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, collection, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = { apiKey: "AIzaSyAhxv3c9aajgCYHnEJG7TS_VxKqJ06KBJg", authDomain: "logistica-exp.firebaseapp.com", projectId: "logistica-exp" };
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    // Ajuste inicial das datas
    const hoje = new Date().toISOString().split('T')[0];
    document.getElementById('dataInicio').value = hoje;
    document.getElementById('dataFim').value = hoje;

    onAuthStateChanged(auth, user => {
        if(user) {
            document.getElementById('userName').innerText = "👤 " + user.email.split('@')[0].toUpperCase();
        } else {
            window.location.href = "index.html";
        }
    });

    document.getElementById('btnLogout').onclick = () => signOut(auth);

    async function carregarRelatorio() {
        const dIni = document.getElementById('dataInicio').value; // Formato yyyy-mm-dd
        const dFim = document.getElementById('dataFim').value;
        const vinculoFiltro = document.getElementById('filtroVinculo').value;
        const corpo = document.getElementById('corpoTabela');
        
        corpo.innerHTML = '<tr><td colspan="6" style="text-align:center;">Buscando informações...</td></tr>';

        try {
            // 1. Mapeia Vínculos
            const equipeSnap = await getDocs(collection(db, "equipe"));
            let vinculos = {};
            equipeSnap.forEach(d => vinculos[d.data().nome] = d.data().vinculo || "TERCEIRO");

            // 2. Mapeia Avarias
            const avariasSnap = await getDocs(collection(db, "avarias"));
            let mapaAvarias = {};
            avariasSnap.forEach(doc => {
                const av = doc.data();
                if (av.expedicaoId) {
                    if (!mapaAvarias[av.expedicaoId]) mapaAvarias[av.expedicaoId] = [];
                    mapaAvarias[av.expedicaoId].push(av);
                }
            });

            // 3. Busca Expedições
            const expSnap = await getDocs(query(collection(db, "expedicoes"), orderBy("data", "desc")));
            
            corpo.innerHTML = "";
            let contador = 0;

            expSnap.forEach(docExp => {
                const exp = docExp.data();
                if (!exp.data) return;

                // Lógica de conversão de data string DD/MM/YYYY para YYYY-MM-DD
                const p = exp.data.split('/');
                const dataFormatadaDoc = `${p[2]}-${p[1]}-${p[0]}`;

                // Filtro de Data
                if (dataFormatadaDoc >= dIni && dataFormatadaDoc <= dFim) {
                    const listaEquipe = exp.equipe_carregamento || [];
                    
                    // Mapeia detalhes da equipe
                    const infoEquipe = listaEquipe.map(nome => ({
                        nome: nome,
                        vinculo: vinculos[nome] || "TERCEIRO"
                    }));

                    // Filtro de Vínculo
                    if (vinculoFiltro !== "TODOS") {
                        const temNoFiltro = infoEquipe.some(e => e.vinculo === vinculoFiltro);
                        if (!temNoFiltro) return;
                    }

                    contador++;
                    const idExp = docExp.id;
                    const avariasDaExp = mapaAvarias[idExp];

                    const equipeHtml = infoEquipe.map(e => `<span class="equipe-tag">${e.nome} <small>(${e.vinculo})</small></span>`).join('');

                    let statusHtml = '<span class="status-ok">✅ SEM AVARIAS</span>';
                    if (avariasDaExp) {
                        statusHtml = '<span class="status-avaria">⚠️ POSSUI AVARIA</span>';
                        avariasDaExp.forEach(a => {
                            statusHtml += `<div class="detalhe-avaria"><strong>${a.quantidade}x</strong> - ${a.descricao}</div>`;
                        });
                    }

                    corpo.innerHTML += `
                        <tr>
                            <td>${exp.data}</td>
                            <td><strong>${exp.expedicao}</strong></td>
                            <td>${exp.destino}</td>
                            <td>${exp.placa}<br><small>P: ${exp.peso || 0}kg</small></td>
                            <td>${equipeHtml}</td>
                            <td>${statusHtml}</td>
                        </tr>`;
                }
            });

            if (contador === 0) {
                corpo.innerHTML = '<tr><td colspan="6" style="text-align:center;">Nenhum registro encontrado para esse período/filtro.</td></tr>';
            }

        } catch (error) {
            console.error("Erro detalhado:", error);
            corpo.innerHTML = `<tr><td colspan="6" style="text-align:center; color:red;">Erro ao carregar: ${error.message}</td></tr>`;
        }
    }

    document.getElementById('btnFiltrar').onclick = carregarRelatorio;
    document.getElementById('btnExportExcel').onclick = () => {
        const table = document.getElementById("tabelaQualidade");
        const wb = XLSX.utils.table_to_book(table);
        XLSX.writeFile(wb, `Relatorio_Qualidade_Simonetti.xlsx`);
    };

</script>
</body>
</html>
