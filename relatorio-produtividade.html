<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Relatório de Qualidade - Simonetti</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    
    <style>
        :root { --primary: #d32f2f; --bg-body: #fdf2f2; --white: #fff; --danger: #c62828; --success: #2e7d32; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg-body); margin: 0; }
        
        header { 
            background: var(--primary); color: white; padding: 10px 20px; 
            display: flex; justify-content: space-between; align-items: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2); position: sticky; top: 0; z-index: 1000;
        }

        .btn-header {
            background: rgba(255, 255, 255, 0.15); border: 1px solid white; color: white;
            padding: 6px 12px; border-radius: 4px; cursor: pointer; font-weight: bold;
            text-decoration: none; font-size: 13px;
        }
        .btn-header:hover { background: white; color: var(--primary); }

        .container { padding: 20px; max-width: 1300px; margin: auto; }
        .card { background: var(--white); padding: 20px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        
        /* Estilo da Tabela e Filtros Internos */
        table { width: 100%; border-collapse: collapse; background: white; margin-top: 10px; }
        th { background: #f8f9fa; padding: 10px; text-align: left; border-bottom: 2px solid #ddd; font-size: 11px; color: #333; }
        td { padding: 10px; border-bottom: 1px solid #eee; font-size: 13px; }

        .filter-input {
            width: 100%; padding: 5px; margin-top: 5px; border: 1px solid #ccc;
            border-radius: 4px; font-size: 11px; box-sizing: border-box;
        }

        .status-badge {
            display: inline-block; padding: 4px 8px; border-radius: 12px;
            font-size: 10px; font-weight: bold; text-transform: uppercase;
        }
        .bg-ok { background: #e8f5e9; color: #2e7d32; border: 1px solid #2e7d32; }
        .bg-avaria { background: #ffebee; color: #c62828; border: 1px solid #c62828; }
        
        .detalhe-avaria { font-size: 10px; color: #b71c1c; display: block; margin-top: 2px; }
        .equipe-tag { background: #f1f1f1; padding: 2px 5px; border-radius: 3px; font-size: 11px; margin-right: 2px; border: 1px solid #ddd; }

        .btn-excel { background: #1b5e20; color: white; border: none; padding: 10px 15px; border-radius: 4px; font-weight: bold; cursor: pointer; margin-bottom: 15px; }
    </style>
</head>
<body>

<header>
    <div class="header-left">
        <a href="menu.html" class="btn-header">⬅ VOLTAR</a>
        <span class="user-badge" id="userName">Carregando...</span>
    </div>
    <h1 style="font-size: 18px; margin: 0;">Relatório de Qualidade</h1>
    <button class="btn-header" id="btnLogout">SAIR</button>
</header>

<div class="container">
    <div class="card">
        <button class="btn-excel" id="btnExportExcel">📊 EXPORTAR EXCEL</button>
        <button class="btn-header" style="background: var(--primary); border: none;" onclick="carregarDados()">🔄 ATUALIZAR DADOS</button>

        <div style="overflow-x: auto;">
            <table id="tabelaQualidade">
                <thead>
                    <tr>
                        <<th style="width: 100px;">DATA <input type="text" class="filter-input" data-col="data" placeholder="Filtrar..."></th>
                        <th style="width: 100px;">EXPEDIÇÃO <input type="text" class="filter-input" data-col="codigo" placeholder="Filtrar..."></th>
                        <th>DESTINO <input type="text" class="filter-input" data-col="destino" placeholder="Filtrar..."></th>
                        <th>PLACA <input type="text" class="filter-input" data-col="placa" placeholder="Filtrar..."></th>
                        <th>EQUIPE <input type="text" class="filter-input" data-col="equipe" placeholder="Filtrar..."></th>
                        <th>PRODUTOS / MOTIVOS <input type="text" class="filter-input" data-col="detalhesAvaria" placeholder="Filtrar produto/motivo..."></th>
                        <th style="width: 120px;">SITUAÇÃO <input type="text" class="filter-input" data-col="situacaoStr" placeholder="OK ou AVARIA"></th>    
                    </tr>
                </thead>
                <tbody id="corpoTabela">
                    <tr><td colspan="6" style="text-align:center;">Clique em atualizar para carregar.</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, collection, getDocs, query, orderBy, where } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = { apiKey: "AIzaSyAhxv3c9aajgCYHnEJG7TS_VxKqJ06KBJg", authDomain: "logistica-exp.firebaseapp.com", projectId: "logistica-exp" };
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    let todosOsDados = [];

    onAuthStateChanged(auth, user => {
        if(user) { 
            document.getElementById('userName').innerText = "👤 " + user.email.split('@')[0].toUpperCase(); 
            carregarDadosAutomatico(); // Chama ao iniciar
        } 
        else { window.location.href = "index.html"; }
    });

    document.getElementById('btnLogout').onclick = () => signOut(auth);

    // FUNÇÃO PARA PEGAR O INTERVALO DO MÊS ATUAL
    function getDatasMesAtual() {
        const hoje = new Date();
        const ano = hoje.getFullYear();
        const mes = String(hoje.getMonth() + 1).padStart(2, '0');
        const diaHoje = String(hoje.getDate()).padStart(2, '0');
        
        return {
            inicio: `${ano}-${mes}-01`,
            fim: `${ano}-${mes}-${diaHoje}`
        };
    }

    async function carregarDadosAutomatico() {
        const datas = getDatasMesAtual();
        // Onde 'data' é o campo YYYY-MM-DD no seu Firestore
        const q = query(
            collection(db, "expedicoes"), 
            where("data", ">=", datas.inicio),
            where("data", "<=", datas.fim),
            orderBy("data", "desc")
        );
        await carregarDados(q);
    }

    async function carregarDados(customQuery = null) {
        const corpo = document.getElementById('corpoTabela');
        corpo.innerHTML = '<tr><td colspan="7" style="text-align:center;">Buscando dados do mês atual...</td></tr>';

        try {
            // 1. Busca Equipes para Vínculos
            const equipeSnap = await getDocs(collection(db, "equipe"));
            let vinculos = {};
            equipeSnap.forEach(d => vinculos[d.data().nome] = d.data().vinculo || "TERCEIRO");

            // 2. Busca Avarias Detalhadas
            const avariasSnap = await getDocs(collection(db, "avarias"));
            let mapaAvarias = {};
            avariasSnap.forEach(doc => {
                const av = doc.data();
                if (av.expedicaoId) {
                    if (!mapaAvarias[av.expedicaoId]) mapaAvarias[av.expedicaoId] = [];
                    mapaAvarias[av.expedicaoId].push(av);
                }
            });

            // 3. Busca Expedições (Filtro de Data já aplicado se vier via customQuery)
            const q = customQuery || query(collection(db, "expedicoes"), orderBy("data", "desc"));
            const expSnap = await getDocs(q);
            
            todosOsDados = [];

            expSnap.forEach(docExp => {
                const exp = docExp.data();
                const idExp = docExp.id;
                const avariasDaExp = mapaAvarias[idExp] || null;

                const infoEquipe = (exp.equipe_carregamento || []).map(nome => `${nome} (${vinculos[nome] || 'TERCEIRO'})`);
                
                // Texto para busca interna nos filtros
                let detalhesBusca = "";
                if(avariasDaExp) {
                    detalhesBusca = avariasDaExp.map(a => `${a.codigoProduto} ${a.nomeProduto} ${a.motivo}`).join(" ");
                }

                todosOsDados.push({
                    data: exp.data ? exp.data.split('-').reverse().join('/') : '-',
                    codigo: exp.codigo || exp.expedicao || 'N/A',
                    destino: exp.destino || '-',
                    placa: exp.placa || '-',
                    equipe: infoEquipe.join(', '),
                    avarias: avariasDaExp,
                    detalhesAvaria: detalhesBusca, // Campo invisível para o filtro funcionar
                    situacaoStr: avariasDaExp ? "AVARIA" : "OK"
                });
            });

            renderizarTabela(todosOsDados);

        } catch (error) {
            console.error(error);
            corpo.innerHTML = `<tr><td colspan="7" style="color:red;">Erro: ${error.message}</td></tr>`;
        }
    }

    function renderizarTabela(lista) {
        const corpo = document.getElementById('corpoTabela');
        corpo.innerHTML = "";

        lista.forEach(item => {
            let statusHtml = "";
            let avariaDetalhadaHtml = "";

            if (item.avarias) {
                statusHtml = `<span class="status-badge bg-avaria">⚠️ AVARIA</span>`;
                item.avarias.forEach(a => {
                    avariaDetalhadaHtml += `
                        <div style="border-bottom: 1px dashed #ddd; margin-bottom: 5px; padding-bottom: 2px;">
                            <span class="detalhe-avaria" style="color:#000; font-size:11px;">
                                <strong>Cod: ${a.codigoProduto || 'N/A'}</strong> - ${a.nomeProduto || 'S/D'}
                            </span>
                            <span class="detalhe-avaria">
                                <b>Motivo:</b> ${a.motivo} | <b>Qtd:</b> ${a.quantidade}
                            </span>
                            ${a.descricao ? `<span class="detalhe-avaria"><i>Obs: ${a.descricao}</i></span>` : ''}
                        </div>`;
                });
            } else {
                statusHtml = `<span class="status-badge bg-ok">✅ OK</span>`;
                avariaDetalhadaHtml = `<span style="color:#999; font-size:11px;">Sem ocorrências</span>`;
            }

            const row = `
                <tr>
                    <td>${item.data}</td>
                    <td><strong>${item.codigo}</strong></td>
                    <td>${item.destino}</td>
                    <td>${item.placa}</td>
                    <td><small>${item.equipe}</small></td>
                    <td>${avariaDetalhadaHtml}</td>
                    <td>${statusHtml}</td>
                </tr>`;
            corpo.innerHTML += row;
        });
    }

    // Filtros em tempo real
    document.querySelectorAll('.filter-input').forEach(input => {
        input.addEventListener('keyup', () => {
            const filtros = {};
            document.querySelectorAll('.filter-input').forEach(i => {
                if (i.value) filtros[i.dataset.col] = i.value.toLowerCase();
            });

            const dadosFiltrados = todosOsDados.filter(item => {
                return Object.keys(filtros).every(coluna => {
                    return String(item[coluna]).toLowerCase().includes(filtros[coluna]);
                });
            });
            renderizarTabela(dadosFiltrados);
        });
    });

    document.getElementById('btnExportExcel').onclick = () => {
        const table = document.getElementById("tabelaQualidade");
        const wb = XLSX.utils.table_to_book(table);
        XLSX.writeFile(wb, `Gestao_Qualidade_Simonetti.xlsx`);
    };

    window.carregarDados = () => carregarDados();
</script>
</body>
</html>
