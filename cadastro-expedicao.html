<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerenciar Expedições - Simonetti</title>
    <style>
        :root { --primary: #d32f2f; --bg-body: #fdf2f2; --white: #fff; --text: #333; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg-body); margin: 0; padding: 0; color: var(--text); }
        
        /* Header Padrão */
        header { background: var(--primary); color: white; padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; }
        .header-left { display: flex; align-items: center; gap: 15px; }
        .btn-back { color: white; text-decoration: none; font-size: 20px; }
        .btn-sair { background: rgba(255,255,255,0.2); border: 1px solid white; color: white; padding: 5px 15px; border-radius: 4px; cursor: pointer; font-weight: bold; }

        .container { padding: 20px; max-width: 1000px; margin: auto; }
        .card { background: var(--white); padding: 20px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); margin-bottom: 20px; }
        h2 { color: var(--primary); margin-top: 0; font-size: 18px; border-bottom: 2px solid var(--bg-body); padding-bottom: 10px; }

        /* Formulário */
        .grid-form { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; }
        label { display: block; margin-top: 10px; font-weight: bold; font-size: 13px; }
        input, select { width: 100%; padding: 10px; margin-top: 5px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        .btn-salvar { width: 100%; background: #2e7d32; color: white; border: none; padding: 15px; margin-top: 20px; border-radius: 4px; font-weight: bold; cursor: pointer; font-size: 16px; }

        /* Tabela Responsiva */
        .table-wrapper { overflow-x: auto; background: white; border-radius: 8px; border: 1px solid #eee; }
        table { width: 100%; border-collapse: collapse; min-width: 900px; }
        th { background: #f8f8f8; padding: 12px; text-align: left; font-size: 12px; color: #666; border-bottom: 2px solid #eee; }
        td { padding: 10px; border-bottom: 1px solid #eee; font-size: 13px; }

        /* Badges de Status */
        .badge { padding: 4px 8px; border-radius: 4px; font-size: 11px; font-weight: bold; }
        .status-criado { background: #e3f2fd; color: #1565c0; }
        .status-separacao { background: #fff3e0; color: #ef6c00; }
        .status-concluido { background: #e8f5e9; color: #2e7d32; }

        .btn-acao { padding: 5px 8px; border: none; border-radius: 4px; cursor: pointer; font-size: 11px; font-weight: bold; margin-right: 2px; }
        .btn-edit { background: #ffeb3b; color: #333; }
        .btn-del { background: #ffebee; color: #c62828; }
        .btn-status { background: var(--primary); color: white; }
    </style>
</head>
<body>

<header>
    <div class="header-left">
        <a href="menu.html" class="btn-back">⬅️</a>
        <span>Bem-vindo, <strong id="userName">...</strong></span>
    </div>
    <button class="btn-sair" id="btnSair">SAIR</button>
</header>

<div class="container">
    <div class="card">
        <h2 id="tituloForm">NOVA EXPEDIÇÃO</h2>
        <form id="formExpedicao">
            <input type="hidden" id="editId">
            <div class="grid-form">
                <div>
                    <label>Nº EXPEDIÇÃO</label>
                    <input type="text" id="codExp" placeholder="Ex: 92649" required>
                </div>
                <div>
                    <label>PLACA</label>
                    <input type="text" id="placa" placeholder="ABC1234" maxlength="7" required style="text-transform: uppercase;">
                </div>
                <div>
                    <label>TIPO VEÍCULO</label>
                    <input type="text" id="tipoVeic" placeholder="Busca automática..." readonly style="background: #f9f9f9;">
                </div>
                <div>
                    <label>DESTINO (CENTRAL)</label>
                    <select id="destinoExp" required>
                        <option value="">Selecione...</option>
                        <option value="107-EUNAPOLIS">107 - EUNÁPOLIS</option>
                        <option value="108-BUERAREMA">108 - BUERAREMA</option>
                        <option value="113-SERRA">113 - SERRA</option>
                    </select>
                </div>
                <div>
                    <label>CONFERENTE</label>
                    <select id="conferenteExp" required>
                        <option value="">Selecione...</option>
                        </select>
                </div>
                <div>
                    <label>DATA</label>
                    <input type="date" id="dataExp" required>
                </div>
            </div>
            <button type="submit" class="btn-salvar" id="btnSalvar">SALVAR NO SISTEMA</button>
        </form>
    </div>

    <div class="card">
        <h2>EXPEDIÇÕES DO DIA</h2>
        <div class="table-wrapper">
            <table>
                <thead>
                    <tr>
                        <th>EXPEDIÇÃO</th>
                        <th>PLACA</th>
                        <th>TIPO</th>
                        <th>DESTINO</th>
                        <th>CONFERENTE</th>
                        <th>STATUS</th>
                        <th>AÇÕES</th>
                    </tr>
                </thead>
                <tbody id="corpoTabela">
                    </tbody>
            </table>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, collection, addDoc, doc, getDoc, getDocs, updateDoc, deleteDoc, onSnapshot, query, where, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = { apiKey: "AIzaSyAhxv3c9aajgCYHnEJG7TS_VxKqJ06KBJg", authDomain: "logistica-exp.firebaseapp.com", projectId: "logistica-exp" };
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    // 1. Controle de Sessão e Header
    onAuthStateChanged(auth, async (user) => {
        if (user) {
            const userDoc = await getDoc(doc(db, "usuarios", user.uid));
            if (userDoc.exists()) document.getElementById('userName').innerText = userDoc.data().nome;
            carregarConferentes();
            listarExpedicoes();
        } else { window.location.href = "index.html"; }
    });

    // 2. Busca Automática de Veículo pela Placa
    document.getElementById('placa').addEventListener('blur', async (e) => {
        const placaInformada = e.target.value.toUpperCase().replace("-","");
        const q = query(collection(db, "cad_veiculos"), where("placa", "==", placaInformada));
        const snap = await getDocs(q);
        if(!snap.empty) {
            document.getElementById('tipoVeic').value = snap.docs[0].data().tipo;
        } else {
            document.getElementById('tipoVeic').value = "NÃO CADASTRADO";
        }
    });

    // 3. Carregar Lista de Conferentes (Equipe)
    async function carregarConferentes() {
        const snap = await getDocs(collection(db, "equipe"));
        const select = document.getElementById('conferenteExp');
        select.innerHTML = '<option value="">Selecione...</option>';
        snap.forEach(doc => {
            select.innerHTML += `<option value="${doc.data().nome}">${doc.data().nome}</option>`;
        });
    }

    // 4. Salvar / Editar Expedição
    document.getElementById('formExpedicao').addEventListener('submit', async (e) => {
        e.preventDefault();
        const id = document.getElementById('editId').value;
        const dados = {
            codigo: document.getElementById('codExp').value,
            placa: document.getElementById('placa').value.toUpperCase(),
            tipo: document.getElementById('tipoVeic').value,
            destino: document.getElementById('destinoExp').value,
            conferente: document.getElementById('conferenteExp').value,
            data: document.getElementById('dataExp').value,
            atualizadoEm: serverTimestamp()
        };

        try {
            if (id) {
                await updateDoc(doc(db, "expedicoes", id), dados);
                alert("Atualizado!");
            } else {
                dados.status = "CRIADO";
                dados.criadoEm = serverTimestamp();
                await addDoc(collection(db, "expedicoes"), dados);
                alert("Criado!");
            }
            e.target.reset();
            document.getElementById('editId').value = "";
            document.getElementById('tituloForm').innerText = "NOVA EXPEDIÇÃO";
        } catch (err) { alert("Erro ao salvar."); }
    });

    // 5. Listar Expedições (Tempo Real)
    function listarExpedicoes() {
        const q = query(collection(db, "expedicoes"), orderBy("criadoEm", "desc"));
        onSnapshot(q, (snap) => {
            const corpo = document.getElementById('corpoTabela');
            corpo.innerHTML = "";
            snap.forEach(d => {
                const item = d.data();
                corpo.innerHTML += `
                    <tr>
                        <td>${item.codigo}</td>
                        <td>${item.placa}</td>
                        <td>${item.tipo}</td>
                        <td>${item.destino}</td>
                        <td>${item.conferente}</td>
                        <td><span class="badge ${getStatusClass(item.status)}">${item.status}</span></td>
                        <td>
                            <button class="btn-acao btn-status" onclick="mudarStatus('${d.id}', 'EM SEPARAÇÃO')">SEP.</button>
                            <button class="btn-acao btn-status" onclick="mudarStatus('${d.id}', 'CONFERÊNCIA FINALIZADA')" style="background:#2e7d32">OK</button>
                            <button class="btn-acao btn-edit" onclick="editar('${d.id}')">✏️</button>
                            <button class="btn-acao btn-del" onclick="excluir('${d.id}')">🗑️</button>
                        </td>
                    </tr>
                `;
            });
        });
    }

    function getStatusClass(s) {
        if (s === 'CRIADO') return 'status-criado';
        if (s === 'EM SEPARAÇÃO') return 'status-separacao';
        return 'status-concluido';
    }

    // Funções Globais
    window.mudarStatus = async (id, novoStatus) => {
        await updateDoc(doc(db, "expedicoes", id), { status: novoStatus });
    };

    window.editar = async (id) => {
        const d = await getDoc(doc(db, "expedicoes", id));
        const data = d.data();
        document.getElementById('editId').value = id;
        document.getElementById('codExp').value = data.codigo;
        document.getElementById('placa').value = data.placa;
        document.getElementById('tipoVeic').value = data.tipo;
        document.getElementById('destinoExp').value = data.destino;
        document.getElementById('conferenteExp').value = data.conferente;
        document.getElementById('dataExp').value = data.data;
        document.getElementById('tituloForm').innerText = "EDITANDO EXPEDIÇÃO";
        window.scrollTo(0,0);
    };

    window.excluir = async (id) => {
        if(confirm("Excluir esta expedição?")) await deleteDoc(doc(db, "expedicoes", id));
    };

    document.getElementById('btnSair').onclick = () => signOut(auth);
</script>
</body>
</html>
