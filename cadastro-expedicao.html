<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nova Expedição - Simonetti</title>
    <style>
        :root { --primary: #d32f2f; --bg-body: #fdf2f2; --text-dark: #333; }
        body { font-family: sans-serif; background: var(--bg-body); padding: 20px; }
        .form-card { background: white; padding: 20px; border-radius: 8px; max-width: 500px; margin: auto; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        h2 { color: var(--primary); text-align: center; margin-top: 0; }
        label { display: block; margin-top: 10px; font-weight: bold; font-size: 14px; }
        input, select { width: 100%; padding: 12px; margin-top: 5px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        .btn-salvar { width: 100%; background: var(--primary); color: white; border: none; padding: 15px; margin-top: 20px; border-radius: 4px; font-weight: bold; cursor: pointer; }
        .btn-salvar:active { transform: scale(0.98); }
    </style>
</head>
<body>

<div class="form-card">
    <h2>Nova Expedição</h2>
    <form id="formExpedicao">
        <label>Data</label>
        <input type="date" id="dataExp" required>

        <label>Nº Expedição (Código)</label>
        <input type="text" id="codExp" placeholder="Ex: 92649" required>

        <label>Placa do Veículo (Agrupador)</label>
        <input type="text" id="placaVeiculo" placeholder="Ex: ABC1D23" required>

        <label>Destino</label>
        <select id="destinoExp">
            <option value="CONQUISTA">CONQUISTA</option>
            <option value="SERRA">SERRA</option>
            <option value="BRUMADO">BRUMADO</option>
            <option value="COLATINA">COLATINA</option>
        </select>

        <label>Tipo de Veículo</label>
        <select id="tipoVeiculo">
            <option value="CARRETTA">CARRETTA</option>
            <option value="TRUCK">TRUCK</option>
            <option value="3/4">3/4</option>
        </select>

        <label>Peso (KG)</label>
        <input type="number" step="0.01" id="pesoExp" required>

        <label>Box</label>
        <input type="text" id="boxExp" placeholder="Ex: 29 D">

        <button type="submit" class="btn-salvar">SALVAR NO SISTEMA</button>
    </form>
</div>

<script type="module">
    import { db, collection, addDoc, serverTimestamp } from './firebase-config.js';

    document.getElementById('formExpedicao').addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const btn = e.target.querySelector('button');
        btn.innerText = "Enviando...";
        btn.disabled = true;

        try {
            await addDoc(collection(db, "expedicoes"), {
                data: document.getElementById('dataExp').value,
                codigo: document.getElementById('codExp').value,
                placa: document.getElementById('placaVeiculo').value.toUpperCase(),
                destino: document.getElementById('destinoExp').value,
                veiculo_tipo: document.getElementById('tipoVeiculo').value,
                peso: parseFloat(document.getElementById('pesoExp').value),
                box: document.getElementById('boxExp').value,
                status: "EM SEPARAÇÃO", // Status inicial padrão
                criadoEm: serverTimestamp()
            });

            alert("Expedição salva com sucesso!");
            e.target.reset(); // Limpa o formulário
        } catch (error) {
            console.error("Erro ao salvar: ", error);
            alert("Erro ao salvar dados.");
        } finally {
            btn.innerText = "SALVAR NO SISTEMA";
            btn.disabled = false;
        }
    });
</script>

</body>
</html>
