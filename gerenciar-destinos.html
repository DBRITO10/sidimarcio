<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerenciar Destinos - Simonetti</title>
    <style>
        :root { --primary: #d32f2f; --bg-body: #fdf2f2; --white: #fff; --success: #2e7d32; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg-body); margin: 0; padding: 0; }
        
        /* Header Padronizado */
        header { 
            background: var(--primary); color: white; padding: 10px 20px; 
            display: flex; justify-content: space-between; align-items: center; 
            position: sticky; top: 0; z-index: 1000; box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }
        .header-left { display: flex; align-items: center; gap: 15px; }
        .btn-back { color: white; text-decoration: none; font-size: 20px; background: rgba(255,255,255,0.1); padding: 5px 10px; border-radius: 5px; }
        .btn-sair { background: rgba(255,255,255,0.2); border: 1px solid white; color: white; padding: 5px 15px; border-radius: 4px; cursor: pointer; font-weight: bold; }

        .container { padding: 20px; max-width: 700px; margin: auto; }
        .card { background: var(--white); padding: 20px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); margin-bottom: 20px; }
        
        h2 { color: var(--primary); margin-top: 0; font-size: 18px; border-bottom: 2px solid var(--bg-body); padding-bottom: 10px; text-align: center; }
        
        label { display: block; margin-top: 10px; font-weight: bold; font-size: 13px; }
        input { width: 100%; padding: 12px; margin-top: 5px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; text-transform: uppercase; font-size: 16px; }
        
        /* Campo de Busca */
        .search-box { margin-bottom: 15px; position: relative; }
        .search-box input { background: #fffde7; border: 1px solid #fbc02d; }

        .btn-save { width: 100%; background: var(--success); color: white; border: none; padding: 15px; margin-top: 20px; border-radius: 4px; font-weight: bold; cursor: pointer; }
        .btn-cancelar { width: 100%; background: #757575; color: white; border: none; padding: 10px; margin-top: 10px; border-radius: 4px; font-weight: bold; cursor: pointer; display: none; }

        /* Tabela */
        .table-wrapper { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { background: #f8f8f8; padding: 12px; text-align: left; font-size: 12px; color: #666; }
        td { padding: 12px; border-bottom: 1px solid #eee; font-size: 14px; }
        
        .btn-acao { border: none; padding: 8px; border-radius: 4px; cursor: pointer; font-size: 16px; }
        .edit { background: #fbc02d; margin-right: 5px; }
        .del { background: #ffcdd2; color: #c62828; }

        @media (max-width: 600px) {
            .container { padding: 10px; }
            header { padding: 10px; }
        }
    </style>
</head>
<body>

<header>
    <div class="header-left">
        <a href="menu.html" class="btn-back">⬅️</a>
        <span>Olá, <strong id="userName">...</strong></span>
    </div>
    <button class="btn-sair" id="btnSair">SAIR</button>
</header>

<div class="container">
    <div class="card">
        <h2 id="tituloForm">CADASTRAR DESTINO / CENTRAL</h2>
        <form id="formDestino">
            <input type="hidden" id="editId">
            <label>NOME DA CENTRAL OU CIDADE</label>
            <input type="text" id="nomeDestino" placeholder="Ex: 113 - SERRA" required>
            
            <button type="submit" class="btn-save" id="btnSalvar">SALVAR DESTINO</button>
            <button type="button" class="btn-cancelar" id="btnCancelar" onclick="cancelarEdicao()">CANCELAR EDIÇÃO</button>
        </form>
    </div>

    <div class="card">
        <h2>CENTRAIS CADASTRADAS</h2>
        
        <div class="search-box">
            <input type="text" id="inputBusca" placeholder="🔍 BUSCAR DESTINO...">
        </div>

        <div class="table-wrapper">
            <table>
                <thead>
                    <tr>
                        <th>NOME</th>
                        <th style="text-align: right;">AÇÕES</th>
                    </tr>
                </thead>
                <tbody id="corpoDestino">
                    <tr><td colspan="2" style="text-align: center;">Carregando...</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, collection, addDoc, doc, getDoc, updateDoc, deleteDoc, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = { apiKey: "AIzaSyAhxv3c9aajgCYHnEJG7TS_VxKqJ06KBJg", authDomain: "logistica-exp.firebaseapp.com", projectId: "logistica-exp" };
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    let listaDestinos = []; // Armazena local para o filtro

    // Controle de Acesso
    onAuthStateChanged(auth, async (user) => {
        if (user) {
            const userDoc = await getDoc(doc(db, "usuarios", user.uid));
            if (userDoc.exists()) {
                document.getElementById('userName').innerText = userDoc.data().nome.split(' ')[0].toUpperCase();
            }
        } else {
            window.location.href = "index.html";
        }
    });

    // Salvar / Editar
    const form = document.getElementById('formDestino');
    form.onsubmit = async (e) => {
        e.preventDefault();
        const id = document.getElementById('editId').value;
        const nome = document.getElementById('nomeDestino').value.toUpperCase();
        const btn = document.getElementById('btnSalvar');

        btn.disabled = true;
        btn.innerText = "PROCESSANDO...";

        try {
            if(id) {
                await updateDoc(doc(db, "destinos", id), { nome });
                alert("Destino atualizado!");
                cancelarEdicao();
            } else {
                await addDoc(collection(db, "destinos"), { nome });
                alert("Destino cadastrado!");
            }
            form.reset();
        } catch (err) {
            alert("Erro ao salvar.");
        } finally {
            btn.disabled = false;
            btn.innerText = "SALVAR DESTINO";
        }
    };

    // Renderizar Tabela
    function renderizar(dados) {
        const corpo = document.getElementById('corpoDestino');
        corpo.innerHTML = "";
        dados.forEach(d => {
            corpo.innerHTML += `
                <tr>
                    <td><strong>${d.nome}</strong></td>
                    <td style="text-align: right;">
                        <button class="btn-acao edit" onclick="prepararEdicao('${d.id}', '${d.nome}')">✏️</button>
                        <button class="btn-acao del" onclick="excluir('${d.id}', '${d.nome}')">🗑️</button>
                    </td>
                </tr>`;
        });
    }

    // Listar em Tempo Real
    onSnapshot(query(collection(db, "destinos"), orderBy("nome")), snap => {
        listaDestinos = [];
        snap.forEach(d => listaDestinos.push({ id: d.id, ...d.data() }));
        renderizar(listaDestinos);
    });

    // Filtro de Busca
    document.getElementById('inputBusca').addEventListener('input', e => {
        const termo = e.target.value.toUpperCase();
        const filtrados = listaDestinos.filter(d => d.nome.includes(termo));
        renderizar(filtrados);
    });

    // Funções Globais
    window.prepararEdicao = (id, nome) => {
        document.getElementById('editId').value = id;
        document.getElementById('nomeDestino').value = nome;
        document.getElementById('btnSalvar').innerText = "ATUALIZAR DESTINO";
        document.getElementById('btnCancelar').style.display = "block";
        document.getElementById('tituloForm').innerText = "EDITANDO DESTINO";
        window.scrollTo({ top: 0, behavior: 'smooth' });
    };

    window.cancelarEdicao = () => {
        document.getElementById('editId').value = "";
        form.reset();
        document.getElementById('btnSalvar').innerText = "SALVAR DESTINO";
        document.getElementById('btnCancelar').style.display = "none";
        document.getElementById('tituloForm').innerText = "CADASTRAR DESTINO";
    };

    window.excluir = async (id, nome) => {
        if(confirm(`Excluir o destino ${nome}?`)) {
            await deleteDoc(doc(db, "destinos", id));
        }
    };

    document.getElementById('btnSair').onclick = () => signOut(auth);
</script>
</body>
</html>
