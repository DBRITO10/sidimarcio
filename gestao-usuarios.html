<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestão de Usuários - Simonetti</title>
    <style>
        :root { --primary: #d32f2f; --bg-body: #fdf2f2; --white: #fff; --text: #333; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg-body); margin: 0; padding: 0; color: var(--text); }
        
        header { background: var(--primary); color: white; padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; }
        .header-left { display: flex; align-items: center; gap: 15px; }
        .btn-back { color: white; text-decoration: none; font-size: 20px; }
        .btn-sair { background: rgba(255,255,255,0.2); border: 1px solid white; color: white; padding: 5px 15px; border-radius: 4px; cursor: pointer; font-weight: bold; }

        .container { padding: 20px; max-width: 1000px; margin: auto; }
        .card { background: var(--white); padding: 20px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); margin-bottom: 20px; }
        h2 { color: var(--primary); margin-top: 0; font-size: 18px; border-bottom: 2px solid var(--bg-body); padding-bottom: 10px; }

        /* Tabela Responsiva */
        .table-wrapper { overflow-x: auto; background: white; border-radius: 8px; }
        table { width: 100%; border-collapse: collapse; min-width: 800px; }
        th { background: #f8f8f8; padding: 12px; text-align: left; font-size: 12px; color: #666; border-bottom: 2px solid #eee; }
        td { padding: 12px; border-bottom: 1px solid #eee; font-size: 13px; }

        /* Modal de Edição */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 2000; align-items: center; justify-content: center; }
        .modal-content { background: white; padding: 25px; border-radius: 8px; width: 90%; max-width: 450px; }
        .modal-content label { display: block; margin-top: 15px; font-weight: bold; font-size: 13px; }
        .modal-content input, .modal-content select { width: 100%; padding: 10px; margin-top: 5px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        
        .btn-save { width: 100%; background: #2e7d32; color: white; border: none; padding: 12px; border-radius: 4px; font-weight: bold; cursor: pointer; margin-top: 20px; }
        .btn-cancel { width: 100%; background: #9e9e9e; color: white; border: none; padding: 10px; border-radius: 4px; margin-top: 10px; cursor: pointer; }

        .badge { padding: 4px 8px; border-radius: 4px; font-size: 11px; font-weight: bold; text-transform: uppercase; }
        .admin { background: #ffebee; color: #c62828; }
        .colaborador { background: #e3f2fd; color: #1565c0; }
        .usuario { background: #e8f5e9; color: #2e7d32; }
        .leitor { background: #f5f5f5; color: #616161; }

        .btn-edit { background: #fbc02d; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<header>
    <div class="header-left">
        <a href="menu.html" class="btn-back">⬅️</a>
        <span>Bem-vindo, <strong id="userName">...</strong></span>
    </div>
    <button class="btn-sair" id="btnSair">SAIR</button>
</header>

<div class="container">
    <div class="card">
        <h2>GESTÃO DE ACESSOS E USUÁRIOS</h2>
        <div class="table-wrapper">
            <table>
                <thead>
                    <tr>
                        <th>NOME</th>
                        <th>E-MAIL</th>
                        <th>NÍVEL</th>
                        <th>CENTRAL VINCULADA</th>
                        <th>AÇÕES</th>
                    </tr>
                </thead>
                <tbody id="listaUsuarios">
                    </tbody>
            </table>
        </div>
    </div>
</div>

<div class="modal" id="modalUser">
    <div class="modal-content">
        <h3>Editar Usuário</h3>
        <input type="hidden" id="editUserId">
        
        <label>NOME COMPLETO</label>
        <input type="text" id="editNome">

        <label>NÍVEL DE ACESSO</label>
        <select id="editNivel">
            <option value="admin">Administrador (Acesso Total)</option>
            <option value="colaborador">Colaborador (Expedição/Pátio)</option>
            <option value="usuario">Usuário Central (Conferência)</option>
            <option value="leitor">Leitor (Apenas Dashboard)</option>
        </select>

        <label>CENTRAIS VINCULADAS (Para usuários de Central)</label>
        <input type="text" id="editCentral" placeholder="Ex: 107-EUNAPOLIS, 108-BUERAREMA">
        <small style="font-size: 10px; color: #777;">Dica: Separe as centrais por vírgula.</small>

        <button class="btn-save" id="btnSalvarUser">SALVAR ALTERAÇÕES</button>
        <button class="btn-cancel" onclick="fecharModal()">CANCELAR</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, collection, doc, getDoc, getDocs, updateDoc, onSnapshot, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = { apiKey: "AIzaSyAhxv3c9aajgCYHnEJG7TS_VxKqJ06KBJg", authDomain: "logistica-exp.firebaseapp.com", projectId: "logistica-exp" };
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    async function registrarLog(acao, detalhe) {
        await addDoc(collection(db, "historico"), {
            usuario: auth.currentUser.email,
            acao: acao,
            detalhe: detalhe,
            data: serverTimestamp()
        });
    }

    onAuthStateChanged(auth, async (user) => {
        if (user) {
            const userDoc = await getDoc(doc(db, "usuarios", user.uid));
            if (userDoc.exists()) {
                if (userDoc.data().nivel !== 'admin') {
                    alert("Acesso negado!");
                    window.location.href = "menu.html";
                    return;
                }
                document.getElementById('userName').innerText = userDoc.data().nome;
                carregarUsuarios();
            }
        } else { window.location.href = "index.html"; }
    });

    function carregarUsuarios() {
        onSnapshot(collection(db, "usuarios"), (snap) => {
            const corpo = document.getElementById('listaUsuarios');
            corpo.innerHTML = "";
            snap.forEach(d => {
                const u = d.data();
                corpo.innerHTML += `
                    <tr>
                        <td><strong>${u.nome}</strong></td>
                        <td>${u.email}</td>
                        <td><span class="badge ${u.nivel}">${u.nivel}</span></td>
                        <td>${u.central || 'TODAS'}</td>
                        <td><button class="btn-edit" onclick="abrirModal('${d.id}', '${u.nome}', '${u.nivel}', '${u.central || ''}')">EDITAR</button></td>
                    </tr>
                `;
            });
        });
    }

    window.abrirModal = (id, nome, nivel, central) => {
        document.getElementById('editUserId').value = id;
        document.getElementById('editNome').value = nome;
        document.getElementById('editNivel').value = nivel;
        document.getElementById('editCentral').value = central;
        document.getElementById('modalUser').style.display = 'flex';
    };

    window.fecharModal = () => {
        document.getElementById('modalUser').style.display = 'none';
    };

    document.getElementById('btnSalvarUser').onclick = async () => {
        const id = document.getElementById('editUserId').value;
        const novoNome = document.getElementById('editNome').value;
        const novoNivel = document.getElementById('editNivel').value;
        const novaCentral = document.getElementById('editCentral').value;

        try {
            await updateDoc(doc(db, "usuarios", id), {
                nome: novoNome,
                nivel: novoNivel,
                central: novaCentral
            });
            await registrarLog("GESTÃO USUÁRIO", `Alterou permissões de ${novoNome}`);
            alert("Usuário atualizado!");
            fecharModal();
        } catch (e) { alert("Erro ao atualizar."); }
    };

    document.getElementById('btnSair').onclick = () => signOut(auth);
</script>
</body>
</html>
